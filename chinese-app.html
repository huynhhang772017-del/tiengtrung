function pickRandom(arr, n){
  const copy = [...arr].sort(()=>Math.random()-0.5);
  return copy.slice(0,n);
}

function buildQuiz(){
  const pool = VOCAB;
  const qs = [];
  // 3 câu chọn nghĩa
  pickRandom(pool, 3).forEach(v=>{
    const distract = pickRandom(pool.filter(x=>x.m!==v.m), 3).map(x=>x.m);
    const opts = [...distract, v.m].sort(()=>Math.random()-0.5);
    qs.push({type:"meaning", q:`"${v.h}" (${v.p}) nghĩa là gì?`, opts, correct:v.m, word:v});
  });
  // 2 câu chọn chữ Hán từ pinyin
  pickRandom(pool, 2).forEach(v=>{
    const distract = pickRandom(pool.filter(x=>x.h!==v.h), 3).map(x=>x.h);
    const opts = [...distract, v.h].sort(()=>Math.random()-0.5);
    qs.push({type:"hanzi", q:`Chữ Hán cho "${v.p}" (${v.m}) là?`, opts, correct:v.h, word:v});
  });
  // 2 câu nghe và chọn
  pickRandom(pool, 2).forEach(v=>{
    const distract = pickRandom(pool.filter(x=>x.h!==v.h), 3).map(x=>x.h);
    const opts = [...distract, v.h].sort(()=>Math.random()-0.5);
    qs.push({type:"listen", q:`Bấm 🔊 và chọn từ bạn nghe được:`, opts, correct:v.h, word:v, playword:v.h});
  });
  // 1 câu nói
  const sv = pickRandom(pool, 1)[0];
  qs.push({type:"speak", q:`Hãy phát âm từ sau:`, word:sv, correct:sv.h});
  return qs;
}

let Q = null;
function startQuiz(){
  Q = {questions:buildQuiz(), current:0, correct:0, answers:[]};
  renderQuiz();
}
function renderQuiz(){
  const box = document.getElementById("quizBox");
  if(Q.current >= Q.questions.length){
    return finishQuiz();
  }
  const q = Q.questions[Q.current];
  const progress = ((Q.current)/Q.questions.length*100)|0;
  let body = "";
  if(q.type==="listen"){
    body = `<button class="btn btn-pri" onclick="speak('${q.playword}')">🔊 Phát lại</button>
      <div style="margin-top:14px">${q.opts.map((o,i)=>`<button class="quiz-opt" onclick="answerQuiz('${o}')">${o}</button>`).join("")}</div>`;
    setTimeout(()=>speak(q.playword), 300);
  } else if(q.type==="speak"){
    body = `
      <div style="text-align:center">
        <div class="hanzi">${q.word.h}</div>
        <div class="pinyin">${q.word.p}</div>
        <div class="meaning">${q.word.m}</div>
        <button class="btn btn-ghost" onclick="speak('${q.word.h}')">🔊 Nghe mẫu</button>
        <button class="mic-big" id="qmic" onclick="quizSpeak('${q.word.h}')">🎙️</button>
        <div class="mic-status" id="qms">Nhấn mic và nói theo</div>
      </div>`;
  } else {
    body = `<div>${q.opts.map(o=>`<button class="quiz-opt" onclick="answerQuiz('${o}')">${o}</button>`).join("")}</div>`;
  }
  box.innerHTML = `
    <div class="card">
      <div class="bar"><i style="width:${progress}%"></i></div>
      <p class="sub" style="margin:6px 0">Câu ${Q.current+1}/${Q.questions.length}</p>
      <h3>${q.q}</h3>
      ${body}
    </div>
  `;
}
window.answerQuiz = function(choice){
  const q = Q.questions[Q.current];
  const ok = (choice===q.correct);
  if(ok) Q.correct++;
  else {
    S.mistakes.push({h:q.word.h, p:q.word.p, m:q.word.m, type:q.type, date:new Date().toISOString(), count:1});
  }
  Q.answers.push({q, choice, ok});
  Q.current++;
  setTimeout(renderQuiz, 300);
};
window.quizSpeak = function(target){
  const qms = document.getElementById("qms");
  document.getElementById("qmic").classList.add("rec");
  qms.innerHTML = "🎙️ Đang nghe...";
  listenOnce((text)=>{
    const r = scorePronunciation(target, text);
    const ok = r.score>=70;
    if(ok) Q.correct++;
    else S.mistakes.push({h:target, type:"pronunciation", date:new Date().toISOString(), count:1});
    Q.answers.push({q:Q.questions[Q.current], choice:text, ok, score:r.score});
    qms.innerHTML = `<b style="color:${ok?'var(--ok)':'var(--pri)'}">${r.score}/100</b> – ${r.detail}`;
    document.getElementById("qmic").classList.remove("rec");
    Q.current++;
    setTimeout(renderQuiz, 1400);
  }, ()=>document.getElementById("qmic").classList.remove("rec"));
};
function finishQuiz(){
  const score = Math.round(Q.correct/Q.questions.length*100);
  S.quizHistory.push({date:new Date().toISOString().slice(0,10), score, total:Q.questions.length});
  S.dailyDone = new Date().toISOString().slice(0,10);
  addXP(30 + Q.correct*5);
  saveState();
  setTimeout(function(){ showNextStepToast("Daily Quiz ("+score+"%)"); }, 1000);
  const errs = Q.answers.filter(a=>!a.ok).slice(0,3);
  document.getElementById("quizBox").innerHTML = `
    <div class="card" style="text-align:center">
      <h2>Kết quả Daily Quiz</h2>
      <div class="score-circle" style="background:conic-gradient(var(--pri) 0% ${score}%, #e2e8f0 ${score}% 100%)">${score}</div>
      <p style="margin:16px 0">Đúng <b>${Q.correct}/${Q.questions.length}</b> · +${30+Q.correct*5} XP</p>
      ${errs.length?`
        <div class="panel" style="text-align:left;background:#fff7ed">
          <b>⚠️ Câu sai:</b>
          ${errs.map(a=>`<div style="margin-top:6px">• ${a.q.word.h} (${a.q.word.p}) = ${a.q.word.m}</div>`).join("")}
        </div>`:`<p style="color:var(--ok)">🎉 Bạn trả lời đúng hết!</p>`}
      <button class="btn btn-pri" onclick="nav('dashboard')">Về Dashboard</button>
      <button class="btn btn-ghost" onclick="startQuiz()">Làm lại</button>
    </div>
  `;
}

// Helper: lấy câu của ngày hôm nay theo seed date (ổn định)
function getLazyToday(){
  const today = new Date().toISOString().slice(0,10);
  // seed = days since epoch (đảm bảo mỗi ngày khác nhau)
  const seed = Math.floor(new Date(today).getTime()/(1000*60*60*24));
  const idx = seed % LAZY_POOL.length;
  return {date: today, item: LAZY_POOL[idx], idx};
}

function getLazyStreak(){
  // Đếm chuỗi ngày liên tiếp đã tick lazyDone
  let streak = 0;
  let d = new Date();
  while(true){
    const ds = d.toISOString().slice(0,10);
    if(S.lazyDone[ds]){ streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}

window.lazyPlay = function(rate){
  const {date, item} = getLazyToday();
  speak(item.h, rate?{rate}:{});
  const cnt = (S.lazyPlayCount[date] || 0);
  if(cnt < 10){ // giới hạn tối đa
    S.lazyPlayCount[date] = cnt + 1;
    saveState();
  }
  // Re-render để cập nhật đếm
  if((S.lazyPlayCount[date]||0) <= 3) render("lazy");
};

window.lazyListen = function(){
  const {item} = getLazyToday();
  const el = document.getElementById("lazyMic");
  el.textContent = "🎙️ Đang nghe...";
  listenOnce((text)=>{

window.lazySnooze = function(){
  S.lazySnoozeUntil = Date.now() + 2*60*60*1000; // 2 giờ sau
  saveState();
  toast("Ok, hẹn bạn 2 giờ nữa. App sẽ không phán xét đâu 😄");
  // Đặt setTimeout để hiện notification nếu được cho phép
  if("Notification" in window && Notification.permission === "granted"){
    setTimeout(()=>{
      const {item} = getLazyToday();
      new Notification("⏰ 60 giây tiếng Trung thôi!", {
        body: `${item.h} (${item.p}) - ${item.m}`,

window.requestLazyNotif = function(){
  if(!("Notification" in window)){ toast("Trình duyệt không hỗ trợ","err"); return; }
  Notification.requestPermission().then(p=>{
    if(p==="granted"){
      toast("✅ Đã bật thông báo! Bạn sẽ được nhắc lúc "+S.lazyHour+":00");
      new Notification("🀄 Bật thông báo thành công!", {body:"Bạn sẽ được nhắc mỗi ngày lúc "+S.lazyHour+":00"});
      scheduleLazyNotif();
      render("lazy");
    } else {
      toast("Bạn đã từ chối thông báo","err");
    }
  });
};

// Lên lịch nhắc nhở mỗi ngày vào lazyHour (chỉ chạy khi app đang mở)
let _lazyNotifTimer = null;
function scheduleLazyNotif(){
  if(_lazyNotifTimer) clearTimeout(_lazyNotifTimer);
  if(!("Notification" in window) || Notification.permission !== "granted") return;
  const now = new Date();
  const target = new Date();
  target.setHours(S.lazyHour, 0, 0, 0);
  if(target <= now) target.setDate(target.getDate()+1); // ngày mai nếu đã qua giờ
  const delay = target - now;
  _lazyNotifTimer = setTimeout(()=>{
    const {date, item} = getLazyToday();
    if(!S.lazyDone[date]){
      new Notification("🀄 60 giây tiếng Trung thôi!", {
        body: `${item.h} (${item.p}) - ${item.m}\nLười thì lười chứ streak đừng bể nha!`,
        requireInteraction: false
      });
    }
    scheduleLazyNotif(); // lặp cho ngày hôm sau
  }, delay);
}

window.playDialogueSeq = async function(lines){
  for(const l of lines){
    await new Promise(res=>{
      speak(l);
      setTimeout(res, Math.max(1200, l.length*350));
    });
  }
};

window.exPracticeSpeak = function(hanzi, pinyin){
  const resEl = document.getElementById("exMicResult");
  const micBtn = document.getElementById("exMic");
  resEl.textContent = "🎙️ Đang nghe...";
  micBtn.classList.add("rec");
  listenOnce((text)=>{
    const r = scorePronunciation(hanzi, text);
    const color = r.score>=80?'#166534':r.score>=50?'#ca8a04':'#991b1b';
    resEl.innerHTML = `<b style="color:${color}">${r.score}/100</b> · ${r.detail} · bạn nói: "${r.recognized||'(không rõ)'}"`;
    if(r.score>=70){ addXP(5); toast("Phát âm tốt! +5 XP"); }
  }, ()=>{
    micBtn.classList.remove("rec");
    if(!resEl.innerHTML.includes("bạn nói")) resEl.textContent = "❌ Không nhận được âm thanh. Thử lại.";
  });
};

window.completeExpressDay = function(dayNum){
  if(!S.completedExpress.includes(dayNum)){
    S.completedExpress.push(dayNum);
    addXP(20);
    saveState();
    toast("🎉 Hoàn thành ngày "+dayNum+"! +20 XP");
    setTimeout(function(){ showNextStepToast("Cấp tốc ngày "+dayNum); }, 1000);
  }
  // Tự nhảy sang ngày kế tiếp nếu có
  if(dayNum<30){
    setTimeout(()=>openExpressDay(dayNum+1), 800);
  } else {
    setTimeout(()=>{ toast("🏆 Chúc mừng! Hoàn thành 30 ngày cấp tốc!"); nav('express'); }, 800);
  }
};

window.exportData = function(){
  S.lastBackup = new Date().toISOString().slice(0,10);

  const a = document.createElement("a");

window.importData = function(e){
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{
    try{ S = Object.assign(defaultState(), JSON.parse(r.result)); saveState(); toast("Đã nhập dữ liệu"); render("dashboard"); }
    catch(e){ toast("File không hợp lệ","err"); }
  };
  r.readAsText(f);
};
window.resetAll = function(){

};

/* --- Smart Coach: biết bạn đang ở đâu, gợi ý bước tiếp theo --- */
function getNextStep(){
  var today = new Date().toISOString().slice(0,10);
  var lazyDone = !!S.lazyDone[today];
  var quizDone = S.dailyDone === today;
  var learnedCount = Object.keys(S.vocabSRS).length;

  // Priority 1: Chế độ lười hôm nay chưa làm
  if(!lazyDone) return {icon:"😴",title:"Học 1 câu mỗi ngày",desc:"Chỉ 60 giây thôi – giữ streak nào!",action:"nav('lazy')",btn:"60s thôi →",color:"#f59e0b",bg:"linear-gradient(135deg,#fef3c7,#fde68a)",priority:1};

  // Priority 2: Lộ trình - tìm bài tiếp theo chưa hoàn thành
  if(typeof stationUnlocked==="function"){
    for(var i=0;i<LESSONS.length;i++){
      var lid = LESSONS[i].id;
      if(stationUnlocked(lid) && !stationDone(lid)){
        var prog = stationProgress(lid);
        var stepNames = ["Từ mới","Nghe","Đọc hiểu","Nói","Quiz"];
        var nextStepIdx = 0;
        var rm = S.roadmap[lid] || {};
        var stKeys = ["vocab","listen","read","speak","quiz"];
        for(var k=0;k<stKeys.length;k++){ if(!rm[stKeys[k]]){nextStepIdx=k;break;} }
        return {icon:"🗺️",title:"Lộ trình: Bài "+lid+" – "+LESSONS[i].title,desc:"Bước tiếp: "+stepNames[nextStepIdx]+" ("+Math.round(prog*100)+"% xong)",action:"nav('roadmap')",btn:"Tiếp tục →",color:"#4f46e5",bg:"linear-gradient(135deg,#eef2ff,#e0e7ff)",priority:2};
      }
    }
  }

  // Priority 3: Daily Quiz chưa làm
  if(!quizDone) return {icon:"🎯",title:"Daily Quiz hôm nay",desc:"8 câu, 5 phút, +50 XP!",action:"nav('quiz')",btn:"Làm quiz →",color:"#ea580c",bg:"linear-gradient(135deg,#fff7ed,#fed7aa)",priority:3};

  // Priority 4: Flashcards ôn tập
  if(learnedCount >= 5) return {icon:"🃏",title:"Ôn tập Flashcards",desc:"Bạn đã học "+learnedCount+" từ – lật thẻ nhớ lâu hơn!",action:"nav('flashcards')",btn:"Ôn tập →",color:"#7c3aed",bg:"linear-gradient(135deg,#f5f3ff,#ede9fe)",priority:4};

  // Priority 5: Chat AI
  return {icon:"💬",title:"Luyện nói với AI",desc:"Thử hội thoại trong tình huống thực tế!",action:"nav('chat')",btn:"Chat →",color:"#0284c7",bg:"linear-gradient(135deg,#e0f2fe,#bae6fd)",priority:5};
}

  }
  render("dashboard");
  // Auto-show guide for new users
  if(!S.xp && !S.guideShown){ S.guideShown = true; saveState(); setTimeout(showGuide, 600); }
});
</script>
