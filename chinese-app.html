<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>学中文 - Học tiếng Trung giao tiếp</title>
<style>
  :root{
    --bg:#f4f6fb;--card:#fff;--ink:#0f172a;--muted:#64748b;
    --pri:#dc2626;--pri-d:#b91c1c;--pri-l:#fef2f2;--pri-2:#fca5a5;
    --accent:#f59e0b;--ok:#16a34a;--line:#e2e8f0;--blue:#2563eb;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,"Segoe UI",Roboto,Arial,"Noto Sans SC",sans-serif;background:var(--bg);color:var(--ink)}
  button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
  .app{display:flex;min-height:100vh}
  /* SIDEBAR */
  .side{width:240px;background:linear-gradient(180deg,#1e293b,#0f172a);color:#fff;padding:18px 12px;flex-shrink:0}
  .logo{font-size:22px;font-weight:800;padding:6px 10px 16px;display:flex;gap:10px;align-items:center}
  .logo span.c{color:var(--pri);font-size:26px}
  .side nav{display:flex;flex-direction:column;gap:4px}
  .side button{width:100%;text-align:left;padding:10px 14px;border-radius:10px;color:#cbd5e1;font-size:14px;display:flex;align-items:center;gap:10px}
  .side button:hover{background:rgba(255,255,255,.06);color:#fff}
  .side button.act{background:var(--pri);color:#fff}
  .side .ico{width:22px;text-align:center}
  .streak{margin-top:auto;padding:14px;border-radius:12px;background:rgba(255,255,255,.06);margin-top:20px;font-size:13px}
  .streak b{color:var(--accent);font-size:22px;display:block}
  /* MAIN */
  main{flex:1;padding:24px 28px;max-width:100%;overflow-x:hidden}
  h1{margin:0 0 4px;font-size:26px}
  h1+.sub{color:var(--muted);margin:0 0 22px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
  .card{background:var(--card);border-radius:14px;padding:18px;box-shadow:0 2px 10px rgba(15,23,42,.05);border:1px solid var(--line)}
  .stat b{display:block;font-size:28px;color:var(--pri);font-weight:800}
  .stat span{color:var(--muted);font-size:13px}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px;font-weight:600;font-size:14px;transition:all .15s}
  .btn-pri{background:var(--pri);color:#fff}
  .btn-pri:hover{background:var(--pri-d)}
  .btn-ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
  .btn-ghost:hover{background:#f8fafc}
  .btn-accent{background:var(--accent);color:#422006}
  .btn-ok{background:var(--ok);color:#fff}
  .btn-block{width:100%;justify-content:center}
  .chip{display:inline-block;padding:4px 10px;border-radius:999px;background:#fee2e2;color:#991b1b;font-size:12px;margin:2px 4px 2px 0;font-weight:500}
  .chip.g{background:#dcfce7;color:#166534}
  .chip.b{background:#dbeafe;color:#1e40af}
  .chip.y{background:#fef3c7;color:#854d0e}
  .chip.gray{background:#f1f5f9;color:#334155}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .hanzi{font-size:48px;font-weight:700;text-align:center;margin:10px 0;color:var(--pri);font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif}
  .pinyin{font-size:22px;text-align:center;color:var(--muted)}
  .meaning{font-size:18px;text-align:center;margin:8px 0}
  .bar{height:8px;background:#e2e8f0;border-radius:999px;overflow:hidden;margin:6px 0}
  .bar>i{display:block;height:100%;background:var(--pri);border-radius:999px;transition:width .3s}
  .bar>i.g{background:var(--ok)}
  .bar>i.y{background:var(--accent)}
  .mic-big{width:90px;height:90px;border-radius:50%;background:var(--pri);color:#fff;display:flex;align-items:center;justify-content:center;font-size:36px;margin:14px auto;box-shadow:0 4px 20px rgba(220,38,38,.35);border:0;cursor:pointer;transition:all .2s}
  .mic-big:hover{transform:scale(1.05)}
  .mic-big.rec{background:#b91c1c;animation:pulse 1s infinite}
  .mic-big:disabled{opacity:.5;cursor:not-allowed}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.6)}50%{box-shadow:0 0 0 20px rgba(220,38,38,0)}}
  @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
  @keyframes glowPulse{0%,100%{box-shadow:0 0 8px rgba(79,70,229,.3)}50%{box-shadow:0 0 20px rgba(79,70,229,.6)}}
  .flash{perspective:1000px;height:320px;margin:20px auto;max-width:420px}
  .flash-inner{position:relative;width:100%;height:100%;transition:transform .6s;transform-style:preserve-3d;cursor:pointer}
  .flash.flip .flash-inner{transform:rotateY(180deg)}
  .flash-face{position:absolute;inset:0;backface-visibility:hidden;background:#fff;border:2px solid var(--line);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
  .flash-back{transform:rotateY(180deg);background:var(--pri-l);border-color:var(--pri-2)}
  .grid2{display:grid;grid-template-columns:2fr 1fr;gap:20px}
  @media (max-width:900px){.grid2{grid-template-columns:1fr}.side{width:72px;padding:12px 6px}.side .ltxt{display:none}.side .logo{justify-content:center}.side .logo .ltxt{display:none}.streak{display:none}main{padding:18px 14px}}

  /* === MOBILE: <= 640px → bottom nav, full width === */
  @media (max-width:640px){
    .app{flex-direction:column;min-height:100vh;min-height:100dvh}
    .side{width:100%;position:fixed;bottom:0;left:0;right:0;z-index:999;padding:0;background:linear-gradient(180deg,#1e293b,#0f172a);flex-shrink:0;order:2;box-shadow:0 -2px 16px rgba(0,0,0,.3)}
    .side .logo{display:none}
    .side nav{display:flex;flex-direction:row;overflow-x:auto;gap:0;padding:4px 2px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .side nav::-webkit-scrollbar{display:none}
    .side nav button{flex:0 0 auto;padding:8px 6px;font-size:11px;border-radius:8px;flex-direction:column;gap:2px;min-width:56px;text-align:center;justify-content:center}
    .side nav button .ico{font-size:18px;width:auto}
    .side nav button .ltxt{display:block!important;font-size:9px;white-space:nowrap;opacity:.8}
    .side nav button.act{background:var(--pri)}
    .side .streak{display:none}
    main{padding:14px 10px 80px 10px;order:1;max-width:100vw}
    h1{font-size:20px}
    .cards{grid-template-columns:repeat(2,1fr);gap:8px}
    .card{padding:12px;border-radius:10px}
    .stat b{font-size:22px}
    .stat span{font-size:11px}
    .btn{padding:10px 14px;font-size:14px;min-height:44px}
    .panel{padding:12px}
    .hanzi{font-size:36px}
    .pinyin{font-size:18px}
    .meaning{font-size:16px}
    .flash{height:260px}
    .chat{min-height:280px;max-height:360px}
    .msg{max-width:88%;font-size:14px}
    .mic-big{width:70px;height:70px;font-size:28px}
    .quiz-opt{padding:12px;font-size:14px;min-height:44px}
    .tabs{width:100%}
    .tabs button{padding:8px 10px;font-size:12px;flex:1}
    input[type=text],select{font-size:16px!important;min-height:44px}
    .row{gap:8px}
    .scenario-card{padding:12px}
    .scenario-card .emo{font-size:24px}
    .grid2{gap:10px}
    .pin-cell{padding:8px 4px}
    .pin-cell b{font-size:14px}
    .flash{height:240px;max-width:100%}
    .wave{height:24px}
    .score-circle{width:90px;height:90px;font-size:28px}
    /* Guide overlay mobile */
    #guideOverlay>div{max-height:85vh;border-radius:16px 16px 0 0}
    #fabHome{bottom:70px!important;left:10px!important;width:44px!important;height:44px!important}
  }
  .chat{background:#f8fafc;border-radius:12px;padding:14px;min-height:360px;max-height:440px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
  .msg{padding:10px 14px;border-radius:16px;max-width:80%;font-size:15px;line-height:1.5}
  .msg.ai{background:#fff;border:1px solid var(--line);align-self:flex-start;border-top-left-radius:4px}
  .msg.me{background:var(--pri);color:#fff;align-self:flex-end;border-top-right-radius:4px}
  .msg small{display:block;opacity:.75;margin-top:4px;font-size:12px}
  .panel{background:var(--card);border-radius:12px;padding:16px;border:1px solid var(--line);margin-bottom:12px}
  select,input[type=text]{padding:8px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit}
  .wave{display:flex;gap:3px;align-items:end;height:30px;justify-content:center;margin:8px 0}
  .wave i{width:3px;background:var(--pri);border-radius:2px;animation:w 1s infinite}
  .wave i:nth-child(2){animation-delay:.1s}.wave i:nth-child(3){animation-delay:.2s}
  .wave i:nth-child(4){animation-delay:.3s}.wave i:nth-child(5){animation-delay:.4s}
  .wave i:nth-child(6){animation-delay:.5s}.wave i:nth-child(7){animation-delay:.6s}
  @keyframes w{0%,100%{height:6px}50%{height:28px}}
  .lesson-item{padding:14px;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;cursor:pointer;transition:all .15s}
  .lesson-item:hover{border-color:var(--pri);background:var(--pri-l)}
  .lesson-item.locked{opacity:.5;cursor:not-allowed}
  .lesson-item.done{background:#f0fdf4;border-color:#86efac}
  .pinyin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:8px}
  .pin-cell{background:#fff;border:1px solid var(--line);border-radius:8px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .15s}
  .pin-cell:hover{background:var(--pri-l);border-color:var(--pri);transform:translateY(-2px)}
  .pin-cell b{display:block;font-size:16px;color:var(--pri)}
  .toast{position:fixed;top:20px;right:20px;background:var(--ok);color:#fff;padding:12px 20px;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:1000;animation:slide .3s ease;max-width:calc(100vw - 40px)}
  .toast.err{background:var(--pri)}
  .toast.info{background:var(--blue)}
  @keyframes slide{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
  .score-circle{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:36px;font-weight:800;color:#fff;background:conic-gradient(var(--pri) 0% 80%,#e2e8f0 80% 100%)}
  .hide{display:none!important}
  .mic-status{text-align:center;color:var(--muted);font-size:13px;margin-top:6px;min-height:20px}
  .tone{display:inline-block;width:28px;height:28px;border-radius:50%;line-height:28px;text-align:center;color:#fff;font-weight:700;margin:0 3px;font-size:14px}
  .t1{background:#ef4444}.t2{background:#f59e0b}.t3{background:#10b981}.t4{background:#3b82f6}.t5{background:#6b7280}
  .scenario-card{padding:16px;border:2px solid var(--line);border-radius:12px;cursor:pointer;transition:all .15s;text-align:center}
  .scenario-card:hover{border-color:var(--pri);background:var(--pri-l)}
  .scenario-card.act{border-color:var(--pri);background:var(--pri-l)}
  .scenario-card .emo{font-size:32px;margin-bottom:6px}
  details summary{cursor:pointer;padding:8px;border-radius:6px}
  details summary:hover{background:#f8fafc}
  .mistake-item{padding:12px;background:#fff;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .quiz-opt{padding:12px;background:#fff;border:2px solid var(--line);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:all .15s;text-align:left;width:100%;font-size:15px}
  .quiz-opt:hover{border-color:var(--pri)}
  .quiz-opt.sel{border-color:var(--pri);background:var(--pri-l)}
  .quiz-opt.correct{border-color:var(--ok);background:#f0fdf4}
  .quiz-opt.wrong{border-color:var(--pri);background:var(--pri-l)}
  .tabs{display:flex;gap:4px;background:#f1f5f9;padding:4px;border-radius:10px;width:fit-content;margin-bottom:16px}
  .tabs button{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;color:var(--muted)}
  .tabs button.act{background:#fff;color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.08)}
</style>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="side">
    <div class="logo"><span class="c">学</span><span class="ltxt">中文</span></div>
    <nav id="nav">
      <button data-v="dashboard" class="act"><span class="ico">📊</span><span class="ltxt">Dashboard</span></button>
      <button data-v="roadmap" style="background:linear-gradient(90deg,#dbeafe,#c7d2fe);color:#3730a3;font-weight:600"><span class="ico">🗺️</span><span class="ltxt">Lộ trình</span></button>
      <button data-v="lazy" style="background:linear-gradient(90deg,#fef3c7,#fde68a);color:#92400e;font-weight:600"><span class="ico">😴</span><span class="ltxt">Lười 1 phút</span></button>
      <button data-v="express"><span class="ico">🚀</span><span class="ltxt">Cấp tốc 30 ngày</span></button>
      <button data-v="lessons"><span class="ico">📚</span><span class="ltxt">Bài học</span></button>
      <button data-v="pinyin"><span class="ico">🔤</span><span class="ltxt">Phát âm</span></button>
      <button data-v="flashcards"><span class="ico">🃏</span><span class="ltxt">Flashcards</span></button>
      <button data-v="chat"><span class="ico">💬</span><span class="ltxt">AI 1-1</span></button>
      <button data-v="quiz"><span class="ico">🎯</span><span class="ltxt">Daily Quiz</span></button>
      <button data-v="mistakes"><span class="ico">⚠️</span><span class="ltxt">Lỗi của tôi</span></button>
      <button data-v="settings"><span class="ico">⚙️</span><span class="ltxt">Cài đặt</span></button>
      <button onclick="showGuide()" style="margin-top:10px;background:linear-gradient(90deg,#d1fae5,#a7f3d0);color:#065f46;font-weight:600;border-radius:10px"><span class="ico">❓</span><span class="ltxt">Hướng dẫn học</span></button>
    </nav>
    <div class="streak ltxt">
      <small>🔥 Chuỗi ngày</small>
      <b id="sideStreak">0</b>
      <small id="sideXp">0 XP</small>
    </div>
  </aside>

  <!-- MAIN -->
  <main id="main"></main>
</div>

<div id="toast" class="toast hide"></div>
<button id="fabHome" onclick="nav('dashboard')" style="display:none;position:fixed;bottom:16px;left:16px;z-index:998;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#1e293b,#334155);color:#fff;border:0;cursor:pointer;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 16px rgba(0,0,0,.3);transition:transform .15s" onmouseenter="this.style.transform='scale(1.1)'" onmouseleave="this.style.transform='scale(1)'">🏠</button>

   1. DATA: HSK 1 vocabulary + lessons + scenarios

        {s:"B",h:"是的，我是北京人。你呢？",p:"shì de, wǒ shì Běijīng rén. nǐ ne?",m:"Đúng rồi, tôi là người Bắc Kinh. Còn bạn?"},
        {s:"A",h:"我是越南人。我在学中文。",p:"wǒ shì Yuènán rén. wǒ zài xué zhōngwén.",m:"Tôi là người Việt Nam. Tôi đang học tiếng Trung."},
        {s:"B",h:"你的中文很好！",p:"nǐ de zhōngwén hěn hǎo!",m:"Tiếng Trung của bạn giỏi lắm!"},
        {s:"A",h:"谢谢！明天见！",p:"xièxie! míngtiān jiàn!",m:"Cảm ơn! Mai gặp nhé!"},
        {s:"B",h:"再见！",p:"zàijiàn!",m:"Tạm biệt!"},
      ]},
      {name:"Xin lỗi và cảm ơn", lines:[
        {s:"A",h:"对不起，请问这是你的书吗？",p:"duìbuqǐ, qǐngwèn zhè shì nǐ de shū ma?",m:"Xin lỗi, cho hỏi đây là sách của bạn không?"},
        {s:"B",h:"是的，是我的。谢谢你！",p:"shì de, shì wǒ de. xièxie nǐ!",m:"Đúng rồi, của tôi. Cảm ơn bạn!"},
        {s:"A",h:"不客气。你好，我是新来的学生。",p:"bú kèqi. nǐ hǎo, wǒ shì xīn lái de xuéshēng.",m:"Không có gì. Xin chào, tôi là học sinh mới."},
        {s:"B",h:"欢迎你！我叫小美。",p:"huānyíng nǐ! wǒ jiào Xiǎo Měi.",m:"Chào mừng bạn! Tôi tên Tiểu Mỹ."},
        {s:"A",h:"请多关照！",p:"qǐng duō guānzhào!",m:"Mong bạn giúp đỡ nhiều!"},
        {s:"B",h:"没关系，有什么不懂就问我。",p:"méi guānxi, yǒu shénme bù dǒng jiù wèn wǒ.",m:"Không sao, có gì không hiểu cứ hỏi tôi."},
      ]},
      {name:"Chào hàng xóm buổi sáng", lines:[
        {s:"A",h:"早上好！",p:"zǎoshang hǎo!",m:"Chào buổi sáng!"},
        {s:"B",h:"早上好！你今天去哪里？",p:"zǎoshang hǎo! nǐ jīntiān qù nǎlǐ?",m:"Chào buổi sáng! Hôm nay bạn đi đâu?"},
        {s:"A",h:"我去上班。你呢？",p:"wǒ qù shàngbān. nǐ ne?",m:"Tôi đi làm. Còn bạn?"},
        {s:"B",h:"我去买东西。再见，路上小心！",p:"wǒ qù mǎi dōngxi. zàijiàn, lùshang xiǎoxīn!",m:"Tôi đi mua đồ. Tạm biệt, đi đường cẩn thận!"},
        {s:"A",h:"谢谢，再见！",p:"xièxie, zàijiàn!",m:"Cảm ơn, tạm biệt!"},
      ]},
    ]
  },
  {
    id:2, title:"Gia đình của tôi", topic:"family", level:1,
    intro:"Giới thiệu về các thành viên trong gia đình.",
    words:["爸爸","妈妈","哥哥","姐姐","弟弟","妹妹","朋友","家"],
    dialogues:[
      {name:"Giới thiệu gia đình", lines:[
        {s:"A",h:"你家有几口人？",p:"nǐ jiā yǒu jǐ kǒu rén?",m:"Nhà bạn có mấy người?"},
        {s:"B",h:"我家有五口人。爸爸、妈妈、哥哥、我和妹妹。",p:"wǒ jiā yǒu wǔ kǒu rén. bàba, māma, gēge, wǒ hé mèimei.",m:"Nhà tôi có 5 người. Bố, mẹ, anh trai, tôi và em gái."},
        {s:"A",h:"你哥哥做什么工作？",p:"nǐ gēge zuò shénme gōngzuò?",m:"Anh trai bạn làm gì?"},
        {s:"B",h:"他是医生，在医院工作。",p:"tā shì yīshēng, zài yīyuàn gōngzuò.",m:"Anh ấy là bác sĩ, làm ở bệnh viện."},
        {s:"A",h:"你妹妹多大？",p:"nǐ mèimei duō dà?",m:"Em gái bạn bao nhiêu tuổi?"},
        {s:"B",h:"她今年十六岁，还在上高中。",p:"tā jīnnián shíliù suì, hái zài shàng gāozhōng.",m:"Em ấy năm nay 16 tuổi, còn đang học cấp 3."},
        {s:"A",h:"你们住在一起吗？",p:"nǐmen zhù zài yìqǐ ma?",m:"Mọi người sống cùng nhau à?"},
        {s:"B",h:"是的，我们住在一起。",p:"shì de, wǒmen zhù zài yìqǐ.",m:"Đúng rồi, chúng tôi sống cùng nhau."},
      ]},
      {name:"Xem ảnh gia đình", lines:[
        {s:"A",h:"这是谁？",p:"zhè shì shéi?",m:"Đây là ai vậy?"},
        {s:"B",h:"这是我爸爸。他很高。",p:"zhè shì wǒ bàba. tā hěn gāo.",m:"Đây là bố tôi. Ông ấy rất cao."},
        {s:"A",h:"他旁边的人呢？",p:"tā pángbiān de rén ne?",m:"Người bên cạnh ông ấy thì sao?"},
        {s:"B",h:"那是我妈妈。她很漂亮。",p:"nà shì wǒ māma. tā hěn piàoliang.",m:"Đó là mẹ tôi. Bà ấy rất đẹp."},
        {s:"A",h:"后面的小女孩是你妹妹吗？",p:"hòumiàn de xiǎo nǚhái shì nǐ mèimei ma?",m:"Bé gái phía sau là em gái bạn à?"},
        {s:"B",h:"对，她叫小花。她很可爱。",p:"duì, tā jiào Xiǎo Huā. tā hěn kě'ài.",m:"Đúng rồi, em ấy tên Tiểu Hoa. Em ấy rất dễ thương."},
        {s:"A",h:"你们一家人真幸福！",p:"nǐmen yì jiā rén zhēn xìngfú!",m:"Gia đình bạn thật hạnh phúc!"},
      ]},
    ]
  },
  {
    id:3, title:"Số đếm 1-10", topic:"numbers", level:1,
    intro:"Học cách đếm từ 1 đến 10 và hỏi tuổi, số lượng.",
    words:["一","二","三","四","五","六","七","八","九","十"],
    dialogues:[
      {name:"Hỏi tuổi", lines:[
        {s:"A",h:"你好！你今年多大？",p:"nǐ hǎo! nǐ jīnnián duō dà?",m:"Xin chào! Năm nay bạn bao nhiêu tuổi?"},
        {s:"B",h:"我今年二十五岁。你呢？",p:"wǒ jīnnián èrshíwǔ suì. nǐ ne?",m:"Năm nay tôi 25 tuổi. Còn bạn?"},
        {s:"A",h:"我三十岁了。你有孩子吗？",p:"wǒ sānshí suì le. nǐ yǒu háizi ma?",m:"Tôi 30 tuổi rồi. Bạn có con chưa?"},
        {s:"B",h:"有，我有两个孩子。一个五岁，一个三岁。",p:"yǒu, wǒ yǒu liǎng ge háizi. yī gè wǔ suì, yī gè sān suì.",m:"Có, tôi có 2 đứa. Một đứa 5 tuổi, một đứa 3 tuổi."},
        {s:"A",h:"真可爱！你家有几口人？",p:"zhēn kě'ài! nǐ jiā yǒu jǐ kǒu rén?",m:"Dễ thương quá! Nhà bạn có mấy người?"},
        {s:"B",h:"四口人。我、老婆和两个孩子。",p:"sì kǒu rén. wǒ, lǎopo hé liǎng ge háizi.",m:"4 người. Tôi, vợ và 2 đứa con."},
      ]},
      {name:"Mua đồ đếm số", lines:[
        {s:"A",h:"你好，我要买苹果。",p:"nǐ hǎo, wǒ yào mǎi píngguǒ.",m:"Xin chào, tôi muốn mua táo."},
        {s:"B",h:"要几个？",p:"yào jǐ gè?",m:"Lấy mấy quả?"},
        {s:"A",h:"六个。多少钱一个？",p:"liù gè. duōshao qián yī gè?",m:"6 quả. Bao nhiêu tiền 1 quả?"},
        {s:"B",h:"两块钱一个。六个十二块。",p:"liǎng kuài qián yī gè. liù gè shí'èr kuài.",m:"2 tệ 1 quả. 6 quả 12 tệ."},
        {s:"A",h:"好的，再要三个橙子。",p:"hǎo de, zài yào sān gè chéngzi.",m:"Được, lấy thêm 3 quả cam."},
        {s:"B",h:"三个橙子九块。一共二十一块。",p:"sān gè chéngzi jiǔ kuài. yígòng èrshíyī kuài.",m:"3 quả cam 9 tệ. Tổng cộng 21 tệ."},
        {s:"A",h:"给你，谢谢！",p:"gěi nǐ, xièxie!",m:"Đây, cảm ơn!"},
      ]},
    ]
  },
  {
    id:4, title:"Thời gian & Ngày tháng", topic:"time", level:1,
    intro:"Nói về hôm nay, ngày mai, giờ giấc, lịch hẹn.",
    words:["今天","明天","昨天","现在","点","星期","小时","分钟"],
    dialogues:[
      {name:"Hỏi giờ và lịch", lines:[
        {s:"A",h:"现在几点了？",p:"xiànzài jǐ diǎn le?",m:"Bây giờ mấy giờ rồi?"},
        {s:"B",h:"现在下午三点半。",p:"xiànzài xiàwǔ sān diǎn bàn.",m:"Bây giờ 3 giờ rưỡi chiều."},
        {s:"A",h:"今天星期几？",p:"jīntiān xīngqī jǐ?",m:"Hôm nay thứ mấy?"},
        {s:"B",h:"今天星期三。你明天有空吗？",p:"jīntiān xīngqī sān. nǐ míngtiān yǒu kòng ma?",m:"Hôm nay thứ tư. Mai bạn rảnh không?"},
        {s:"A",h:"明天上午有课，下午有空。",p:"míngtiān shàngwǔ yǒu kè, xiàwǔ yǒu kòng.",m:"Mai sáng có tiết, chiều rảnh."},
        {s:"B",h:"那我们明天下午两点见吧。",p:"nà wǒmen míngtiān xiàwǔ liǎng diǎn jiàn ba.",m:"Vậy mình hẹn gặp 2 giờ chiều mai nhé."},
        {s:"A",h:"好的，不见不散！",p:"hǎo de, bú jiàn bú sàn!",m:"Được, không gặp không về!"},
      ]},
      {name:"Nói về kế hoạch tuần", lines:[
        {s:"A",h:"这个星期你忙吗？",p:"zhège xīngqī nǐ máng ma?",m:"Tuần này bạn bận không?"},
        {s:"B",h:"星期一到星期五都要上班。",p:"xīngqī yī dào xīngqī wǔ dōu yào shàngbān.",m:"Thứ 2 đến thứ 6 phải đi làm."},
        {s:"A",h:"星期六呢？",p:"xīngqī liù ne?",m:"Thứ 7 thì sao?"},
        {s:"B",h:"星期六上午去学中文，下午休息。",p:"xīngqī liù shàngwǔ qù xué zhōngwén, xiàwǔ xiūxi.",m:"Sáng thứ 7 đi học tiếng Trung, chiều nghỉ."},
        {s:"A",h:"你每天几点起床？",p:"nǐ měi tiān jǐ diǎn qǐchuáng?",m:"Mỗi ngày bạn mấy giờ dậy?"},
        {s:"B",h:"七点起床，晚上十一点睡觉。",p:"qī diǎn qǐchuáng, wǎnshang shíyī diǎn shuìjiào.",m:"7 giờ dậy, tối 11 giờ đi ngủ."},
      ]},
    ]
  },
  {
    id:5, title:"Ăn uống ở nhà hàng", topic:"food", level:2,
    intro:"Gọi món, hỏi giá, thanh toán, phàn nàn.",
    words:["吃","喝","米饭","菜","茶","水","多少","点菜"],
    dialogues:[
      {name:"Gọi món ăn", lines:[
        {s:"A",h:"你好，欢迎光临！请坐。",p:"nǐ hǎo, huānyíng guānglín! qǐng zuò.",m:"Xin chào, hoan nghênh quý khách! Mời ngồi."},
        {s:"B",h:"谢谢。请给我们菜单。",p:"xièxie. qǐng gěi wǒmen càidān.",m:"Cảm ơn. Cho chúng tôi thực đơn."},
        {s:"A",h:"好的，请看。今天有鱼香肉丝和宫保鸡丁。",p:"hǎo de, qǐng kàn. jīntiān yǒu yúxiāng ròusī hé gōngbǎo jīdīng.",m:"Được, mời xem. Hôm nay có thịt xào chua cay và gà kung pao."},
        {s:"B",h:"我要一份鱼香肉丝，一碗米饭。",p:"wǒ yào yī fèn yúxiāng ròusī, yī wǎn mǐfàn.",m:"Cho tôi 1 phần thịt xào chua cay, 1 bát cơm."},
        {s:"C",h:"我要宫保鸡丁，不要太辣。",p:"wǒ yào gōngbǎo jīdīng, bú yào tài là.",m:"Tôi muốn gà kung pao, đừng quá cay."},
        {s:"A",h:"好的。要喝什么？",p:"hǎo de. yào hē shénme?",m:"Được. Uống gì ạ?"},
        {s:"B",h:"两杯绿茶，谢谢。",p:"liǎng bēi lǜchá, xièxie.",m:"Hai cốc trà xanh, cảm ơn."},
        {s:"A",h:"好的，请稍等。",p:"hǎo de, qǐng shāo děng.",m:"Được, mời đợi chút."},
      ]},
      {name:"Thanh toán", lines:[
        {s:"B",h:"服务员，买单！",p:"fúwùyuán, mǎidān!",m:"Phục vụ ơi, tính tiền!"},
        {s:"A",h:"好的。一共八十五块。",p:"hǎo de. yígòng bāshíwǔ kuài.",m:"Được. Tổng cộng 85 tệ."},
        {s:"B",h:"可以用手机付吗？",p:"kěyǐ yòng shǒujī fù ma?",m:"Thanh toán bằng điện thoại được không?"},
        {s:"A",h:"可以，微信和支付宝都行。",p:"kěyǐ, Wēixìn hé Zhīfùbǎo dōu xíng.",m:"Được, WeChat và Alipay đều được."},
        {s:"B",h:"好的，我用微信。",p:"hǎo de, wǒ yòng Wēixìn.",m:"Được, tôi dùng WeChat."},
        {s:"A",h:"付好了。谢谢，欢迎下次再来！",p:"fù hǎo le. xièxie, huānyíng xià cì zài lái!",m:"Đã thanh toán. Cảm ơn, hoan nghênh lần sau quay lại!"},
      ]},
      {name:"Đồ ăn có vấn đề", lines:[
        {s:"B",h:"服务员，这个菜太咸了。",p:"fúwùyuán, zhège cài tài xián le.",m:"Phục vụ ơi, món này mặn quá."},
        {s:"A",h:"对不起，我帮您换一份。",p:"duìbuqǐ, wǒ bāng nín huàn yī fèn.",m:"Xin lỗi, tôi đổi cho anh/chị phần khác."},
        {s:"B",h:"还有，我点的汤还没来。",p:"hái yǒu, wǒ diǎn de tāng hái méi lái.",m:"Còn nữa, món canh tôi gọi chưa thấy."},
        {s:"A",h:"非常抱歉，我马上去催。",p:"fēicháng bàoqiàn, wǒ mǎshàng qù cuī.",m:"Rất xin lỗi, tôi đi giục ngay."},
        {s:"B",h:"谢谢，快一点。",p:"xièxie, kuài yìdiǎn.",m:"Cảm ơn, nhanh lên nhé."},
        {s:"A",h:"汤来了，请慢用。再次说声对不起。",p:"tāng lái le, qǐng màn yòng. zàicì shuō shēng duìbuqǐ.",m:"Canh đây ạ, mời dùng. Xin lỗi lần nữa."},
      ]},
    ]
  },
  {
    id:6, title:"Mua sắm ở cửa hàng", topic:"shopping", level:2,
    intro:"Hỏi giá, mặc cả, thanh toán.",
    words:["买","多少","钱","便宜","贵","这个","那个","试"],
    dialogues:[
      {name:"Mặc cả mua đồ", lines:[
        {s:"A",h:"你好，我想看看这个包。",p:"nǐ hǎo, wǒ xiǎng kànkan zhège bāo.",m:"Xin chào, tôi muốn xem cái túi này."},
        {s:"B",h:"好的，这个是新款，三百块。",p:"hǎo de, zhège shì xīn kuǎn, sān bǎi kuài.",m:"Được, đây là mẫu mới, 300 tệ."},
        {s:"A",h:"太贵了。便宜一点可以吗？",p:"tài guì le. piányi yìdiǎn kěyǐ ma?",m:"Đắt quá. Rẻ chút được không?"},
        {s:"B",h:"最少两百五。",p:"zuìshǎo liǎng bǎi wǔ.",m:"Ít nhất 250."},
        {s:"A",h:"两百块，行不行？",p:"liǎng bǎi kuài, xíng bù xíng?",m:"200 tệ, được không?"},
        {s:"B",h:"好吧好吧，两百给你。",p:"hǎo ba hǎo ba, liǎng bǎi gěi nǐ.",m:"Thôi được, 200 cho bạn."},
        {s:"A",h:"谢谢！可以刷卡吗？",p:"xièxie! kěyǐ shuā kǎ ma?",m:"Cảm ơn! Quẹt thẻ được không?"},
        {s:"B",h:"可以。",p:"kěyǐ.",m:"Được."},
      ]},
      {name:"Đổi hàng", lines:[
        {s:"A",h:"你好，我想换这个。",p:"nǐ hǎo, wǒ xiǎng huàn zhège.",m:"Xin chào, tôi muốn đổi cái này."},
        {s:"B",h:"怎么了？有什么问题？",p:"zěnme le? yǒu shénme wèntí?",m:"Sao vậy? Có vấn đề gì?"},
        {s:"A",h:"太小了，有大一号的吗？",p:"tài xiǎo le, yǒu dà yī hào de ma?",m:"Nhỏ quá, có số lớn hơn không?"},
        {s:"B",h:"有的，你看这个怎么样？",p:"yǒu de, nǐ kàn zhège zěnmeyàng?",m:"Có, bạn xem cái này thế nào?"},
        {s:"A",h:"好的，可以试试吗？",p:"hǎo de, kěyǐ shìshi ma?",m:"Được, thử được không?"},
        {s:"B",h:"当然可以，试衣间在那边。",p:"dāngrán kěyǐ, shìyījiān zài nàbiān.",m:"Đương nhiên, phòng thử đồ ở kia."},
      ]},
    ]
  },
  {
    id:7, title:"Hỏi đường", topic:"directions", level:2,
    intro:"Hỏi đường đến các địa điểm, chỉ đường.",
    words:["哪里","去","左","右","前面","后面","地铁站","走"],
    dialogues:[
      {name:"Hỏi đường ra ga tàu điện", lines:[
        {s:"A",h:"请问，地铁站在哪里？",p:"qǐngwèn, dìtiě zhàn zài nǎlǐ?",m:"Cho hỏi, ga tàu điện ở đâu?"},
        {s:"B",h:"从这里一直走，到路口左转。",p:"cóng zhèlǐ yìzhí zǒu, dào lùkǒu zuǒ zhuǎn.",m:"Từ đây đi thẳng, đến ngã tư rẽ trái."},

const LS = "zhongwen_app_v1";
const IDB_NAME = "zhongwen_db";
const IDB_STORE = "state";

/* --- IndexedDB helpers (bền hơn localStorage, không bị xóa khi dọn cache thường) --- */
function idbOpen(){
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = ()=>{ req.result.createObjectStore(IDB_STORE); };
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  });
}
function idbSave(data){
  idbOpen().then(db => {
    const tx = db.transaction(IDB_STORE, "readwrite");
    tx.objectStore(IDB_STORE).put(data, "main");
    tx.objectStore(IDB_STORE).put(new Date().toISOString(), "savedAt");
  }).catch(()=>{});
}
function idbLoad(){
  return idbOpen().then(db => {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, "readonly");
      const req = tx.objectStore(IDB_STORE).get("main");
      req.onsuccess = ()=> resolve(req.result || null);
      req.onerror = ()=> reject(req.error);
    });
  }).catch(()=>null);
}

// Audio element dùng cho TTS từ Google (giọng bản ngữ chuẩn)
let _nativeAudio = null;
function _stopNative(){
  if(_nativeAudio){ try{_nativeAudio.pause();_nativeAudio.src="";}catch(e){} _nativeAudio=null; }
  if("speechSynthesis" in window) window.speechSynthesis.cancel();
}
function _speakBrowser(text, opts={}){
  if(!("speechSynthesis" in window)) { toast("Trình duyệt không hỗ trợ TTS","err"); return; }
  const u = new SpeechSynthesisUtterance(text);
  u.lang = S.settings.voice || "zh-CN";
  u.rate = opts.rate || S.settings.rate || 0.9;
  u.pitch = 1;
  const voices = window.speechSynthesis.getVoices();
  let zhVoice = voices.find(v=>v.lang === (S.settings.voice||"zh-CN"));
  if(!zhVoice) zhVoice = voices.find(v=>v.lang && v.lang.startsWith("zh"));
  if(zhVoice) u.voice = zhVoice;
  window.speechSynthesis.speak(u);
}
function speak(text, opts={}){
  // Chỉ đọc chữ Hán (tránh đọc pinyin Latin như tiếng Anh)
  if(!/[\u4e00-\u9fff]/.test(text)){
    toast("Chỉ đọc được chữ Hán, không đọc pinyin Latin","info");
    return;
  }
  _stopNative();
  window.speechSynthesis.cancel(); // dừng giọng browser nếu đang chạy
  // Ưu tiên giọng bản ngữ Google (chất lượng cao, ổn định, không phụ thuộc máy)
  if(S.settings.ttsEngine !== "browser"){
    try {
      const rate = opts.rate || S.settings.rate || 0.9;
      // Google Translate TTS - giọng nữ phổ thông chuẩn Bắc Kinh
      const url = `https://translate.google.com/translate_tts?ie=UTF-8&tl=zh-CN&client=tw-ob&q=${encodeURIComponent(text)}`;
      _nativeAudio = new Audio(url);
      _nativeAudio.playbackRate = rate;
      // Cờ chặn fallback: khi Google TTS đã phát ok thì KHÔNG gọi giọng browser nữa
      let googleStarted = false;
      _nativeAudio.onplaying = ()=>{ googleStarted = true; };
      _nativeAudio.onerror = ()=>{ if(!googleStarted) _speakBrowser(text, opts); };
      const p = _nativeAudio.play();
      if(p && p.catch) p.catch(()=>{ if(!googleStarted) _speakBrowser(text, opts); });
      return;
    } catch(e){
      _speakBrowser(text, opts);
      return;
    }
  }
  _speakBrowser(text, opts);
}

let recognition = null;
let recognizing = false;
function getRecognition(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return null;
  if(!recognition){
    recognition = new SR();
    recognition.lang = "zh-CN";
    recognition.interimResults = false;
    recognition.maxAlternatives = 3;
  }
  return recognition;
}
function listenOnce(onResult, onEnd){
  const r = getRecognition();
  if(!r){ toast("Trình duyệt không hỗ trợ Speech Recognition. Dùng Chrome/Edge.","err"); if(onEnd)onEnd(); return; }
  if(recognizing){ r.stop(); return; }
  r.onresult = (e)=>{
    const alts = [];
    for(let i=0;i<e.results[0].length;i++) alts.push(e.results[0][i].transcript);
    onResult(alts[0], alts);
  };
  r.onerror = (e)=>{ toast("Lỗi mic: "+e.error,"err"); recognizing=false; if(onEnd)onEnd(); };
  r.onend = ()=>{ recognizing=false; if(onEnd)onEnd(); };
  try{ r.start(); recognizing=true; }catch(e){ toast("Không khởi động được mic","err"); }
}

/* Chấm điểm phát âm bằng cách so sánh text trả về từ Speech API với target */
function scorePronunciation(target, recognized){
  // Bỏ dấu câu và khoảng trắng
  const clean = s => (s||"").replace(/[\s,。，.!?！？]/g,"");
  const t = clean(target), r = clean(recognized);
  if(!r) return {score:0, detail:"Không nhận diện được giọng nói"};
  // So sánh từng ký tự
  let match = 0;
  const maxLen = Math.max(t.length, r.length);
  for(let i=0;i<t.length;i++){
    if(r.includes(t[i])) match++;
  }
  // Bonus nếu khớp hoàn toàn
  const exact = (t === r);
  let score = Math.round((match/Math.max(t.length,1))*100);
  if(exact) score = Math.min(100, score+5);
  const detail = exact ? "Hoàn hảo! 🎉" :
    r.length < t.length/2 ? "Bạn nói quá ngắn, hãy thử lại toàn bộ câu" :
    score >= 80 ? "Rất tốt, gần chuẩn rồi!" :
    score >= 60 ? "Khá, chú ý thanh điệu và rõ âm" : "Cần luyện thêm – nghe mẫu và nhắc lại";
  return {score, detail, recognized:r, target:t};
}

  // Tính thông tin hiển thị cho bước 2

    _step2Time = _curStepTime;

  var _doneCount = _plan.filter(function(p){ return p.done; }).length;

  if(!expressDone) _bonusPlan.push({icon:"🚀", label:"Cấp tốc ngày "+expressDayNum+": "+expressToday.title, desc:expressToday.key.h+" ("+expressToday.key.p+") – "+expressToday.key.m, time:"10 phút", action:"openExpressDay("+expressDayNum+")", color:"#059669", bg:"#d1fae5"});

  _bonusPlan.push({icon:"💬", label:"Chat AI luyện nói", desc:"Thực hành hội thoại trong tình huống thực tế", time:"10 phút", action:"nav('chat')", color:"#0284c7", bg:"#e0f2fe"});

  // --- Build HTML cho 3 bước chính ---
  var _planHTML = '';
  var _activeIdx = _plan.findIndex(function(p){ return !p.done; });

  // Bonus section — "Muốn học thêm?" khi xong 3/3

    for(var _bi=0;_bi<_bonusPlan.length;_bi++){

      _bonusHTML += '<div onclick="'+b.action+'" style="background:'+(b.bg||'#fff')+';border:'+(isHL?'2px solid '+b.color:'1px solid #e2e8f0')+';border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;'+(isHL?'animation:glowPulse 2s ease infinite;':'')+'transition:all .15s" onmouseenter="this.style.transform=\'translateX(4px)\'" onmouseleave="this.style.transform=\'none\'">';
      _bonusHTML += '<div style="font-size:24px">'+b.icon+'</div>';
      _bonusHTML += '<div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:700;color:#0f172a">'+b.label+'</div>';
      if(b.desc) _bonusHTML += '<div style="font-size:12px;color:#64748b;margin-top:2px">'+b.desc+'</div>';
      _bonusHTML += '</div>';
      _bonusHTML += '<div style="text-align:right;flex-shrink:0"><div style="font-size:11px;color:#94a3b8;margin-bottom:3px">~'+b.time+'</div>';
      if(isHL) _bonusHTML += '<div style="padding:6px 12px;background:'+b.color+';color:#fff;border-radius:8px;font-size:12px;font-weight:700">Tiếp →</div>';
      _bonusHTML += '</div></div>';
    }
    _bonusHTML += '</div>';
  }

  // Tomorrow preview — nếu hôm nay chưa làm thì mai vẫn là bài hiện tại
  var _tomorrowLabel = '';
  if(_roadmapStepDone && _curLesson){
    // Đã xong hôm nay → mai là bước tiếp
    var _nextStepIdx = -1;
    for(var _k2=0;_k2<_stKeys.length;_k2++){
      if(_stKeys[_k2] === _curStepKey){ _nextStepIdx = _k2+1; break; }
    }
    if(_nextStepIdx >= 0 && _nextStepIdx < _stKeys.length){
      _tomorrowLabel = 'Mai: Bài '+_curLesson.id+' → '+_stLabels[_nextStepIdx];
    } else {
      var _nextL = LESSONS.find(function(l){ return l.id > _curLesson.id; });
      if(_nextL) _tomorrowLabel = 'Mai: Bài mới '+_nextL.id+': '+_nextL.title;
      else _tomorrowLabel = '🎓 Bạn đã hoàn thành toàn bộ lộ trình!';
    }
  }

  MAIN.innerHTML = `
    <h1>Chào mừng trở lại 👋</h1>
    <p class="sub">Hôm nay là ${new Date().toLocaleDateString("vi-VN",{weekday:"long",day:"numeric",month:"long"})}</p>

    <div class="cards">
      <div class="card stat"><b>🔥 ${S.streak}</b><span>Chuỗi ngày học</span></div>
      <div class="card stat"><b>${S.xp}</b><span>XP tổng</span></div>
      <div class="card stat"><b>${learnedCount}</b><span>Từ đã học</span></div>
      <div class="card stat"><b>${avgScore}</b><span>Điểm TB (5 ngày)</span></div>
    </div>

    <div style="margin-top:18px">
      <!-- KẾ HOẠCH HÔM NAY - CHỈ 3 BƯỚC -->
      <div class="card" style="border:2px solid ${_allDone?'#22c55e':'#4f46e5'};border-radius:16px;padding:22px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:8px">
          <h3 style="margin:0;font-size:20px">${_allDone?'🎉 Hoàn thành hôm nay!':'📋 Hôm nay học gì?'}</h3>
          <div style="font-size:13px;color:${_allDone?'#166534':'#4f46e5'};font-weight:700">${_doneCount}/3 ${_allDone?'✅':'· còn ~'+_totalTime+' phút'}</div>
        </div>
        <p style="margin:0 0 14px;font-size:13px;color:#64748b">${_allDone?'Bạn đã xong 3 bước chính. Giỏi lắm! 🏆':'Chỉ 3 bước, làm theo thứ tự là xong!'}</p>

        <!-- Progress dots -->
        <div style="display:flex;gap:6px;margin-bottom:16px">
          ${_plan.map(function(p){ return '<div style="flex:1;height:6px;border-radius:99px;background:'+(p.done?'#22c55e':'#e2e8f0')+';transition:background .3s"></div>'; }).join('')}
        </div>

        ${_planHTML}
        ${_bonusHTML}

        ${_tomorrowLabel ? '<div style="margin-top:12px;padding:10px 14px;background:#f1f5f9;border-radius:10px;font-size:12px;color:#64748b;text-align:center">📅 '+_tomorrowLabel+'</div>' : ''}
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px">
        <div class="card">
          <h3 style="margin-top:0">📅 Streak 7 ngày</h3>
          <div class="row" style="gap:4px">
            ${streakCalendar()}
          </div>
        </div>
        <div class="card">
          <h3 style="margin-top:0">🏆 Huy hiệu</h3>
          <div>
            ${S.streak>=3?`<span class="chip y">🔥 3 ngày</span>`:''}
            ${S.streak>=7?`<span class="chip y">⚡ 1 tuần</span>`:''}
            ${S.streak>=30?`<span class="chip y">💎 30 ngày</span>`:''}
            ${S.xp>=100?`<span class="chip g">💯 100 XP</span>`:''}
            ${S.xp>=500?`<span class="chip g">🚀 500 XP</span>`:''}
            ${S.xp>=2000?`<span class="chip g">👑 2000 XP</span>`:''}
            ${learnedCount>=10?`<span class="chip b">📖 10 từ</span>`:''}
            ${learnedCount>=50?`<span class="chip b">📚 50 từ</span>`:''}
            ${learnedCount>=200?`<span class="chip b">🧠 200 từ</span>`:''}
            ${S.levelTestPassed?.[1]?`<span class="chip" style="background:#d1fae5;color:#065f46">🏆 HSK 1 (${S.levelTestPassed[1]}%)</span>`:''}

        </div>
      </div>` : ''}
    </div>
  `;
};

function streakCalendar(){
  const days = [];
  const today = new Date();
  for(let i=6;i>=0;i--){
    const d = new Date(today); d.setDate(d.getDate()-i);
    const ds = d.toISOString().slice(0,10);
    const active = (S.lastDay && new Date(S.lastDay)>=d.setHours(0,0,0,0));
    const label = ["CN","T2","T3","T4","T5","T6","T7"][new Date(ds).getDay()];
    days.push(`<div class="stat" style="flex:1;padding:10px 4px;${i===0?'border:2px solid var(--pri)':''}">
      <div style="font-size:11px;color:var(--muted)">${label}</div>
      <div style="font-size:18px">${active?"✅":"⬜"}</div>
    </div>`);
  }
  return days.join("");
}

VIEWS.lessons = function(){
  const total = LESSONS.length;
  const done = S.completedLessons.length;
  MAIN.innerHTML = `
    <h1>📚 Bài học (${total} bài)</h1>
    <p class="sub">Lộ trình 3 tháng - Đã hoàn thành ${done}/${total} bài</p>
    <div class="tabs" style="margin:12px 0">
      <button class="act" data-lv="all">Tất cả (${total})</button>
      <button data-lv="1">HSK 1 - Cơ bản</button>
      <button data-lv="2">HSK 2 - Hằng ngày</button>
      <button data-lv="3">HSK 3 - Nâng cao</button>
    </div>
    <div id="lessonList"></div>
  `;
  const render = (filter)=>{
    const list = document.getElementById("lessonList");
    list.innerHTML = "";
    const filtered = filter==="all" ? LESSONS : LESSONS.filter(l=>l.level==parseInt(filter));
    if(filtered.length===0){
      list.innerHTML = `<div class="card"><p class="sub">Chưa có bài nào ở cấp này.</p></div>`;
      return;
    }
    filtered.forEach((l)=>{
      const idx = LESSONS.findIndex(x=>x.id===l.id);
      const prevDone = idx===0 || S.completedLessons.includes(LESSONS[idx-1].id);
      const done = S.completedLessons.includes(l.id);
      const locked = !prevDone && !done;
      const item = document.createElement("div");
      item.className = "lesson-item"+(locked?" locked":"")+(done?" done":"");
      const lvLabel = l.level===1?"HSK 1":(l.level===2?"HSK 2":"HSK 3");
      const lvColor = l.level===1?"#10b981":(l.level===2?"#3b82f6":"#f59e0b");
      item.innerHTML = `
        <div class="row" style="justify-content:space-between">
          <div>
            <div style="font-size:12px;color:var(--muted)">
              Bài ${l.id} · <span style="color:${lvColor};font-weight:600">${lvLabel}</span>
            </div>
            <b style="font-size:17px">${l.title}</b>
            <div style="color:var(--muted);font-size:13px;margin-top:4px">${l.intro}</div>
            <div style="margin-top:6px">
              ${l.words.slice(0,5).map(w=>`<span class="chip gray">${w}</span>`).join("")}
              ${l.words.length>5?`<span class="chip gray">+${l.words.length-5}</span>`:""}
            </div>
          </div>
          <div>${locked?"🔒":(done?"✅":"▶")}</div>
        </div>
      `;
      if(!locked) item.onclick = ()=>openLesson(l);
      list.appendChild(item);
    });
  };
  render("all");
  document.querySelectorAll(".tabs button[data-lv]").forEach(b=>{
    b.onclick = ()=>{
      document.querySelectorAll(".tabs button[data-lv]").forEach(x=>x.classList.remove("act"));
      b.classList.add("act");
      render(b.dataset.lv);
    };
  });
};

window.practiceLine = function(target, idx){
  const ms = document.getElementById("ms"+idx);
  ms.innerHTML = `<span style="color:var(--pri)">🎙️ Đang nghe... nói: ${target}</span>`;
  listenOnce((text)=>{
    const r = scorePronunciation(target, text);
    const color = r.score>=80?"var(--ok)":(r.score>=60?"var(--accent)":"var(--pri)");
    ms.innerHTML = `<div style="color:${color}"><b>${r.score}/100</b> - ${r.detail}</div>
      <div style="color:var(--muted);font-size:12px">Bạn nói: "${r.recognized}"</div>`;
    S.speakingScores.push({score:r.score, date:new Date().toISOString()});
    if(r.score < 60){
      S.mistakes.push({h:target, type:"pronunciation", date:new Date().toISOString(), count:1});
    } else {
      addXP(5);
    }
    saveState();
  }, ()=>{});
};

window.playDialogue = function(lid){
  const l = LESSONS.find(x=>x.id===lid);
  let i = 0;
  function next(){
    if(i>=l.dialogue.length) return;
    speak(l.dialogue[i].h);
    i++;
    setTimeout(next, 2000);
  }
  next();
};

window.completeLesson = function(lid){
  if(!S.completedLessons.includes(lid)){
    S.completedLessons.push(lid);
    addXP(30);
    // Thêm từ vào SRS
    const l = LESSONS.find(x=>x.id===lid);
    l.words.forEach(w=>{
      if(!S.vocabSRS[w]){
        S.vocabSRS[w] = {due:Date.now(), interval:1, easiness:2.5, reps:0};
      }
    });
    saveState();
    toast("🎉 Hoàn thành bài học! +30 XP");
  }
  nav("lessons");
};

window.rateCard = function(key, quality){
  const c = S.vocabSRS[key] || {interval:1, easiness:2.5, reps:0};
  // SM-2 simplified
  if(quality===0){ c.reps=0; c.interval=1; }
  else{
    c.reps++;
    c.easiness = Math.max(1.3, c.easiness + (0.1 - (3-quality)*(0.08+(3-quality)*0.02)));
    if(c.reps===1) c.interval=1;
    else if(c.reps===2) c.interval=3;
    else c.interval = Math.round(c.interval * c.easiness);
  }
  c.due = Date.now() + c.interval*24*3600*1000;
  S.vocabSRS[key] = c;
  if(quality===0){
    S.mistakes.push({h:key, type:"vocab", date:new Date().toISOString(), count:1});
  } else {
    addXP(2);
  }
  saveState();
  showNextCard();
};

window.addMoreVocab = function(){
  const existing = Object.keys(S.vocabSRS);
  const toAdd = VOCAB.filter(v=>!existing.includes(v.h)).slice(0,10);
  toAdd.forEach(v=>{
    S.vocabSRS[v.h] = {due:Date.now(), interval:1, easiness:2.5, reps:0};
  });
  saveState();
  toast(`Đã thêm ${toAdd.length} từ mới`);
  render("flashcards");
};

   ===================================================== */

// 5 bước cho mỗi trạm
const STATION_STEPS = ["vocab","listen","read","speak","quiz"];
const STATION_STEP_INFO = {
  vocab:{icon:"📝",label:"Từ mới"},
  listen:{icon:"🎧",label:"Nghe"},
  read:{icon:"📖",label:"Đọc hiểu"},
  speak:{icon:"🎤",label:"Nói"},
  quiz:{icon:"🎯",label:"Quiz"},
};

function stationDone(lessonId){
  const r = S.roadmap[lessonId];
  return r && STATION_STEPS.every(s=>r[s]);
}
function stationProgress(lessonId){
  const r = S.roadmap[lessonId] || {};
  return STATION_STEPS.filter(s=>r[s]).length;
}
function stationUnlocked(lessonId){
  const idx = LESSONS.findIndex(l=>l.id===lessonId);
  if(idx <= 0) return true;
  return stationDone(LESSONS[idx-1].id);
}
// Helper: lấy tất cả dialogues từ bài (hỗ trợ cả format cũ lẫn mới)
function getLessonDialogues(lesson){
  if(lesson.dialogues && lesson.dialogues.length) return lesson.dialogues;
  if(lesson.dialogue && lesson.dialogue.length) return [{name:"Hội thoại", lines:lesson.dialogue}];
  return [];
}
// Helper: lấy tất cả lines từ mọi dialogues
function getAllLines(lesson){
  return getLessonDialogues(lesson).flatMap(d=>d.lines||[]);
}
// Helper: lấy danh sách từ vựng đầy đủ từ lesson.words
function getLessonVocab(lesson){
  return (lesson.words||[]).map(w=>VOCAB.find(v=>v.h===w)).filter(Boolean);
}

const LEVEL_EMO = {1:"🟢",2:"🟡",3:"🔵"};
const LEVEL_NAME = {1:"HSK 1 · Khởi đầu",2:"HSK 2 · Giao tiếp",3:"HSK 3 · Nâng cao"};
const LEVEL_BG = {1:"#d1fae5",2:"#fef3c7",3:"#dbeafe"};

VIEWS.roadmap = function(){
  const total = LESSONS.length;
  const done = LESSONS.filter(l=>stationDone(l.id)).length;
  const pct = total ? Math.round(done/total*100) : 0;
  // Tìm trạm hiện tại (trạm đầu tiên chưa xong mà đã mở khóa)
  const current = LESSONS.find(l=>!stationDone(l.id) && stationUnlocked(l.id));

  let html = `
    <h1>🗺️ Lộ trình học tiếng Trung</h1>
    <p class="sub">Mỗi trạm 5 bước: <b>Từ mới → Nghe → Đọc hiểu → Nói → Quiz</b>. Hoàn thành để mở trạm tiếp.</p>
    <div class="panel" style="margin-bottom:20px;padding:16px">
      <div class="row" style="justify-content:space-between;margin-bottom:8px">
        <b>Tổng tiến trình</b>
        <span style="color:var(--pri);font-weight:700">${done}/${total} trạm (${pct}%)</span>
      </div>
      <div style="background:#e5e7eb;border-radius:10px;height:14px;overflow:hidden">
        <div style="background:linear-gradient(90deg,#6366f1,#8b5cf6);height:100%;width:${pct}%;border-radius:10px;transition:width 0.5s"></div>
      </div>
    </div>
  `;

  // Group lessons by level
  const byLv = {};
  LESSONS.forEach(l=>{ (byLv[l.level]=byLv[l.level]||[]).push(l); });

  [1,2,3].forEach(lv => {
    if(!byLv[lv]) return;
    const lvDone = byLv[lv].filter(l=>stationDone(l.id)).length;
    const lvTotal = byLv[lv].length;
    html += `
      <div style="margin-bottom:24px">
        <div style="background:${LEVEL_BG[lv]};border-radius:12px;padding:12px 16px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
          <b>${LEVEL_EMO[lv]} ${LEVEL_NAME[lv]}</b>
          <span style="font-size:13px;color:var(--muted)">${lvDone}/${lvTotal} xong</span>
        </div>
        <div style="position:relative;padding-left:28px">
          <div style="position:absolute;left:13px;top:0;bottom:0;width:3px;background:#e5e7eb;border-radius:2px"></div>
    `;
    // Milestones cho level này
    const milestones = [];
    if(lv===1) milestones.push({after:2, trophy:"🥉", label:"Biết chào & giới thiệu!", xp:50});
    if(lv===1) milestones.push({after:lvTotal, trophy:"🏆", label:"Hoàn thành HSK 1!", xp:200, isLevelEnd:true});
    if(lv===2) milestones.push({after:5, trophy:"🥉", label:"Xoay xở được ở nhà hàng & cửa hàng!", xp:50});
    if(lv===2) milestones.push({after:10, trophy:"🥈", label:"Giao tiếp cơ bản thành thạo!", xp:100});
    if(lv===2) milestones.push({after:15, trophy:"🥇", label:"Đi du lịch TQ thoải mái!", xp:150});
    if(lv===2) milestones.push({after:lvTotal, trophy:"🏆", label:"Hoàn thành HSK 2!", xp:300, isLevelEnd:true});
    if(lv===3) milestones.push({after:5, trophy:"🥉", label:"Nắm ngữ pháp nâng cao!", xp:100});
    if(lv===3) milestones.push({after:10, trophy:"🥈", label:"Nói chuyện công việc OK!", xp:150});
    if(lv===3) milestones.push({after:lvTotal, trophy:"🏆", label:"Hoàn thành HSK 3! 🎓", xp:500, isLevelEnd:true});

    let lessonIdx = 0;
    byLv[lv].forEach(lesson => {
      lessonIdx++;
      const isDone = stationDone(lesson.id);
      const isOpen = stationUnlocked(lesson.id);
      const isCurrent = current && current.id === lesson.id;
      const prog = stationProgress(lesson.id);
      const icon = isDone ? "✅" : isCurrent ? "⭐" : isOpen ? "🔵" : "🔒";
      const opacity = isOpen ? "1" : "0.5";
      const cursor = isOpen ? "pointer" : "not-allowed";
      const border = isCurrent ? "border:2px solid #6366f1;box-shadow:0 0 12px rgba(99,102,241,0.3)" : isDone ? "border:2px solid #10b981" : "border:1px solid #e5e7eb";
      const bg = isDone ? "#f0fdf4" : isCurrent ? "#eef2ff" : "#fff";
      const r2 = S.roadmap[lesson.id] || {};
      const progDots = STATION_STEPS.map(s=>r2[s]?"🟢":"⚪").join("");
      html += `
          <div style="position:relative;margin:8px 0;opacity:${opacity}">
            <div style="position:absolute;left:-21px;top:14px;width:14px;height:14px;border-radius:50%;background:${isDone?'#10b981':isCurrent?'#6366f1':'#d1d5db'};border:2px solid #fff;z-index:1"></div>
            <div onclick="${isOpen?`openStation(${lesson.id})`:'void(0)'}" style="background:${bg};${border};border-radius:12px;padding:14px;cursor:${cursor};transition:all 0.2s">
              <div class="row" style="justify-content:space-between;gap:8px">
                <div>
                  <span style="font-size:18px;margin-right:6px">${icon}</span>
                  <b style="font-size:15px">${lesson.title}</b>
                </div>
                <span style="font-size:12px;letter-spacing:1px">${progDots}</span>
              </div>
              <div style="font-size:12px;color:var(--muted);margin-top:4px">
                ${isDone ? "Hoàn thành!" : isOpen ? `Tiến trình: ${prog}/5 (Từ mới·Nghe·Đọc·Nói·Quiz)` : "Hoàn thành trạm trước để mở khóa"}
              </div>
              ${isCurrent ? `<div style="margin-top:6px"><button class="btn" style="padding:4px 14px;font-size:13px" onclick="event.stopPropagation();openStation(${lesson.id})">▶ Tiếp tục</button></div>` : ""}
            </div>
          </div>`;

      // Hiện milestone sau bài này nếu có
      milestones.forEach(ms => {
        if(ms.after !== lessonIdx) return;
        const msReached = lessonIdx <= lvDone;
        const msKey = "ms_lv"+lv+"_"+ms.after;
        const msClaimed = !!S.milestones && !!S.milestones[msKey];
        if(msReached && !msClaimed){
          // Auto-claim XP
          if(!S.milestones) S.milestones = {};
          S.milestones[msKey] = true;
          addXP(ms.xp);
          saveState();
        }
        html += `
          <div style="position:relative;margin:12px 0">
            <div style="position:absolute;left:-24px;top:10px;width:20px;height:20px;border-radius:50%;background:${msReached?'#fbbf24':'#d1d5db'};border:2px solid #fff;z-index:1;display:flex;align-items:center;justify-content:center;font-size:12px">${msReached?'⭐':'🔒'}</div>
            <div style="background:${msReached?'linear-gradient(135deg,#fef3c7,#fde68a)':'#f8fafc'};border:2px ${msReached?'solid #f59e0b':'dashed #d1d5db'};border-radius:14px;padding:14px 16px;text-align:center;${!msReached?'opacity:0.5;':''}">

              <div style="font-size:14px;font-weight:700;color:${msReached?'#92400e':'#94a3b8'}">${ms.label}</div>
              <div style="font-size:12px;color:${msReached?'#b45309':'#94a3b8'};margin-top:2px">${msReached?'✅ Đã đạt! +'+ms.xp+' XP':'Hoàn thành '+ms.after+'/'+lvTotal+' bài để mở'}</div>
              ${ms.isLevelEnd && msReached && !S.levelTestPassed?.[lv] ? '<button class="btn btn-pri" style="margin-top:8px;font-size:13px" onclick="startLevelTest('+lv+')">📝 Làm bài kiểm tra HSK '+lv+'</button>' : ''}
              ${ms.isLevelEnd && S.levelTestPassed?.[lv] ? '<div style="margin-top:6px;font-size:13px;color:#166534;font-weight:700">🎓 Đã đậu bài kiểm tra HSK '+lv+'! ('+S.levelTestPassed[lv]+'%)</div>' : ''}
            </div>
          </div>`;
      });
    });
    html += `</div></div>`;
  });

  MAIN.innerHTML = html;
};

/* --- Station: bài học 5 bước (Từ mới → Nghe → Đọc hiểu → Nói → Quiz+Viết) --- */
let _stationLesson = null;
let _stationStep = null;

/* --- Bài kiểm tra HSK cấp độ --- */
window.startLevelTest = function(lv){
  const lvLessons = LESSONS.filter(l=>l.level===lv);
  // Thu thập tất cả từ vựng của level này
  const allWords = [];
  lvLessons.forEach(l=>{
    (l.words||[]).forEach(w=>{
      const v = VOCAB.find(x=>x.h===w);
      if(v && !allWords.find(x=>x.h===v.h)) allWords.push(v);
    });
  });
  // Thu thập tất cả câu đối thoại
  const allLines = [];
  lvLessons.forEach(l=>{
    const dl = getLessonDialogues(l);
    dl.forEach(d=>(d.lines||[]).forEach(line=>allLines.push(line)));
  });
  // Tạo 15 câu hỏi: 8 vocab MC + 4 nghe hiểu + 3 dịch câu
  const qs = [];
  // Phần A: Chọn nghĩa đúng (8 câu)
  const vocabPool = allWords.sort(()=>Math.random()-.5).slice(0,8);
  vocabPool.forEach(v=>{
    const wrong = allWords.filter(x=>x.h!==v.h).sort(()=>Math.random()-.5).slice(0,3).map(x=>x.m);
    const opts = [v.m,...wrong].sort(()=>Math.random()-.5);
    qs.push({type:"vocab", q:v.h+" ("+v.p+")", answer:v.m, opts:opts, hanzi:v.h});
  });
  // Phần B: Nghe câu → chọn nghĩa (4 câu)
  const linePool = allLines.filter(l=>l.m).sort(()=>Math.random()-.5).slice(0,4);
  linePool.forEach(line=>{
    const wrong = allLines.filter(x=>x.m && x.m!==line.m).sort(()=>Math.random()-.5).slice(0,3).map(x=>x.m);
    const opts = [line.m,...wrong].sort(()=>Math.random()-.5);
    qs.push({type:"listen", q:line.h, answer:line.m, opts:opts, hanzi:line.h});
  });
  // Phần C: Dịch Việt→Trung (3 câu)
  const transPool = allLines.filter(l=>l.m&&l.h).sort(()=>Math.random()-.5).slice(0,3);
  transPool.forEach(line=>{
    const wrong = allLines.filter(x=>x.h && x.h!==line.h).sort(()=>Math.random()-.5).slice(0,3).map(x=>x.h);
    const opts = [line.h,...wrong].sort(()=>Math.random()-.5);
    qs.push({type:"translate", q:"Dịch: \""+line.m+"\"", answer:line.h, opts:opts});
  });

  window._lvTest = {lv:lv, qs:qs, idx:0, correct:0, answers:[]};
  renderLevelTest();
};

function renderLevelTest(){
  const t = window._lvTest;
  if(t.idx >= t.qs.length){
    // Kết quả
    const score = Math.round(t.correct/t.qs.length*100);
    const passed = score >= 70;
    if(passed){
      if(!S.levelTestPassed) S.levelTestPassed = {};
      S.levelTestPassed[t.lv] = score;
      addXP(100 * t.lv);
      saveState();
    }
    MAIN.innerHTML = `
      <div style="max-width:500px;margin:40px auto;text-align:center">
        <div style="font-size:64px;margin-bottom:16px">${passed?'🎓':'📝'}</div>
        <h2>${passed?'🎉 Chúc mừng! Đậu HSK '+t.lv+'!':'Chưa đậu — cố lên!'}</h2>
        <div style="font-size:48px;font-weight:800;color:${passed?'#16a34a':'#dc2626'};margin:16px 0">${score}%</div>
        <p style="color:#64748b">Đúng ${t.correct}/${t.qs.length} câu · Cần ≥70% để đậu</p>
        ${passed?'<p style="color:#16a34a;font-weight:700">+'+100*t.lv+' XP 🏆</p>':'<p style="color:#64748b">Ôn lại bài học rồi thử lại nhé!</p>'}
        <div style="margin-top:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
          <button class="btn btn-pri" onclick="nav('roadmap')">← Về lộ trình</button>
          ${!passed?'<button class="btn btn-ghost" onclick="startLevelTest('+t.lv+')">🔄 Thử lại</button>':''}
        </div>
        <div style="margin-top:24px;text-align:left">
          <h3>Chi tiết:</h3>
          ${t.answers.map((a,i)=>'<div style="padding:10px;margin:4px 0;border-radius:8px;background:'+(a.ok?'#f0fdf4':'#fef2f2')+';border:1px solid '+(a.ok?'#86efac':'#fca5a5')+'"><b>'+(i+1)+'. '+a.q+'</b><br>'+(a.ok?'✅ Đúng: '+a.answer:'❌ Bạn chọn: '+a.picked+' → Đáp án: '+a.answer)+'</div>').join('')}
        </div>
      </div>
    `;
    if(passed) setTimeout(function(){ showNextStepToast("Bài kiểm tra HSK "+t.lv+" ("+score+"%)"); }, 800);
    return;
  }

  const q = t.qs[t.idx];
  const partLabel = q.type==="vocab"?"Phần A: Từ vựng":q.type==="listen"?"Phần B: Nghe hiểu":"Phần C: Dịch câu";
  MAIN.innerHTML = `
    <div style="max-width:560px;margin:20px auto">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <h2 style="margin:0">📝 Kiểm tra HSK ${t.lv}</h2>
        <span style="color:var(--muted);font-size:14px">Câu ${t.idx+1}/${t.qs.length}</span>
      </div>
      <div style="height:6px;background:#e2e8f0;border-radius:99px;overflow:hidden;margin-bottom:20px">
        <div style="height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);border-radius:99px;width:${Math.round(t.idx/t.qs.length*100)}%"></div>
      </div>
      <div style="font-size:12px;color:var(--pri);font-weight:700;margin-bottom:8px">${partLabel}</div>
      <div class="card" style="padding:20px;text-align:center;margin-bottom:16px">
        ${q.type==="listen"?'<button class="btn btn-ghost" onclick="speak(\''+q.hanzi.replace(/'/g,"\\'")+'\')">🔊 Nghe câu hỏi</button><div style="margin-top:10px;font-size:22px;font-weight:700;color:var(--pri)">'+q.q+'</div>':'<div style="font-size:20px;font-weight:700;color:var(--pri)">'+q.q+'</div>'}
      </div>
      <div id="lvTestOpts">
        ${q.opts.map((o,i)=>'<button class="quiz-opt" onclick="pickLevelAnswer('+i+')" style="font-size:15px">'+o+'</button>').join('')}
      </div>
    </div>
  `;
}

window.pickLevelAnswer = function(idx){
  const t = window._lvTest;
  const q = t.qs[t.idx];
  const picked = q.opts[idx];
  const ok = (picked === q.answer);
  if(ok) t.correct++;
  t.answers.push({q:q.q, answer:q.answer, picked:picked, ok:ok});
  // Hiệu ứng đúng/sai
  const btns = document.querySelectorAll("#lvTestOpts .quiz-opt");
  btns.forEach((b,i)=>{
    b.disabled = true;
    if(q.opts[i]===q.answer) b.classList.add("correct");
    if(i===idx && !ok) b.classList.add("wrong");
  });
  setTimeout(function(){ t.idx++; renderLevelTest(); }, 800);
};

window.openStation = function(lessonId){
  const lesson = LESSONS.find(l=>l.id===lessonId);

// Hanzi Writer: hiện animation nét viết
let _hwInstances = {};
window.animateHanzi = function(containerId, text){
  const el = document.getElementById(containerId);
  if(!el) return;
  el.innerHTML = "";
  _hwInstances[containerId] = [];
  if(typeof HanziWriter === "undefined"){
    el.innerHTML = '<span style="color:var(--muted);font-size:12px">Cần kết nối mạng để tải thư viện viết chữ.</span>';
    return;
  }
  for(const ch of text){
    if(!/[一-鿿]/.test(ch)) continue;
    const div = document.createElement("div");
    div.style.cssText = "display:inline-block;width:80px;height:80px;border:1px solid #e5e7eb;border-radius:8px;background:#fafafa";
    el.appendChild(div);
    try{
      const w = HanziWriter.create(div, ch, {
        width:80, height:80, padding:5,
        strokeAnimationSpeed:1, delayBetweenStrokes:300,
        strokeColor:"#6366f1", radicalColor:"#c084fc",
        outlineColor:"#ddd", showOutline:true
      });
      _hwInstances[containerId].push(w);
      w.animateCharacter();
    }catch(e){}
  }
};

// Hanzi Writer: chế độ tập viết (quiz)
window.quizHanzi = function(containerId, text){
  const el = document.getElementById(containerId);
  if(!el) return;
  el.innerHTML = "";
  _hwInstances[containerId] = [];
  if(typeof HanziWriter === "undefined"){
    el.innerHTML = '<span style="color:var(--muted);font-size:12px">Cần kết nối mạng để tải thư viện viết chữ.</span>';
    return;
  }
  for(const ch of text){
    if(!/[一-鿿]/.test(ch)) continue;
    const div = document.createElement("div");
    div.style.cssText = "display:inline-block;width:100px;height:100px;border:2px solid #6366f1;border-radius:8px;background:#fafafa";
    el.appendChild(div);
    try{
      const w = HanziWriter.create(div, ch, {
        width:100, height:100, padding:5,
        showCharacter:false, showOutline:true,
        strokeColor:"#6366f1", outlineColor:"#ddd",
        highlightColor:"#10b981",
        highlightOnComplete:true,
        drawingWidth:12
      });
      _hwInstances[containerId].push(w);
      w.quiz({
        onComplete:function(res){
          toast("✅ Viết đúng chữ "+ch+"! ("+res.totalMistakes+" lỗi)");
        }
      });
    }catch(e){}
  }
  if(el.children.length) el.insertAdjacentHTML("afterend",'<div style="font-size:11px;color:#6366f1;margin-top:4px">Dùng chuột/ngón tay vẽ theo nét.</div>');
};

let _spkScores = {};

window.checkSpkText = function(idx, target){
  const inp = document.getElementById("spkText"+idx);
  if(!inp) return;
  var text = (inp.value||"").trim();
  if(!text){ inp.style.borderColor="#ef4444"; return; }
  // So sánh: hán tự khớp chính xác, hoặc pinyin gần đúng
  var targetClean = target.replace(/[，。！？、\s]/g,"").toLowerCase();
  var textClean = text.replace(/[，。！？、,.\s]/g,"").toLowerCase();
  // Tính % ký tự khớp (dùng LCS đơn giản)
  var score = 0;
  if(textClean === targetClean){
    score = 100;
  } else {
    // Tìm pinyin của target để so sánh
    var line = getAllLines(_stationLesson).find(function(l){ return l.h === target; });
    var targetPy = line ? line.p.replace(/[,.\s!?]/g,"").toLowerCase() : "";
    var textNorm = textClean.replace(/[āáǎàēéěèīíǐìōóǒòūúǔùǖǘǚǜ]/g,function(c){
      return "aaaaeeeeiiiiooooouuuuüüüü"["āáǎàēéěèīíǐìōóǒòūúǔùǖǘǚǜ".indexOf(c)] || c;
    });
    var pyNorm = targetPy.replace(/[āáǎàēéěèīíǐìōóǒòūúǔùǖǘǚǜ]/g,function(c){
      return "aaaaeeeeiiiiooooouuuuüüüü"["āáǎàēéěèīíǐìōóǒòūúǔùǖǘǚǜ".indexOf(c)] || c;
    });
    if(textNorm === pyNorm) score = 90;
    else if(textClean === targetPy) score = 95;
    else {
      // Tính tỉ lệ ký tự đúng
      var matches = 0, shorter = textClean.length < targetClean.length ? textClean : targetClean;
      var longer = textClean.length >= targetClean.length ? textClean : targetClean;
      for(var c=0;c<shorter.length;c++){ if(shorter[c]===longer[c]) matches++; }
      score = Math.round(matches/longer.length*100);
      // Cũng thử so với pinyin
      if(targetPy){
        var pyMatches = 0; var pyShorter = textNorm.length < pyNorm.length ? textNorm : pyNorm;
        var pyLonger = textNorm.length >= pyNorm.length ? textNorm : pyNorm;
        for(var pc=0;pc<pyShorter.length;pc++){ if(pyShorter[pc]===pyLonger[pc]) pyMatches++; }
        var pyScore = Math.round(pyMatches/pyLonger.length*100);
        if(pyScore > score) score = pyScore;
      }
    }
  }
  _spkScores[idx] = score;
  var el = document.getElementById("spkResult"+idx);
  var color = score>=80?"#10b981":score>=60?"#f59e0b":"#ef4444";
  if(el) el.innerHTML = '<div style="padding:8px;border-radius:8px;background:'+(score>=60?'#f0fdf4':'#fef2f2')+'"><b style="color:'+color+';font-size:18px">'+score+'%</b> '+(score>=90?'Xuất sắc!':score>=60?'Đạt!':'Chưa đạt, thử lại nhé')+'<div style="font-size:12px;color:var(--muted);margin-top:2px">Bạn gõ: '+text+' → Đáp án: '+target+'</div></div>';
  inp.style.borderColor = score>=60?"#10b981":"#ef4444";
  updateSpeakDone(window._spkTotal||0);
};

function updateSpeakDone(total){
  const el = document.getElementById("stSpeakDone"); if(!el) return;
  let pass=0; for(let i=0;i<total;i++) if(_spkScores[i]>=60) pass++;

function renderStepQuiz(){
  const lesson = _stationLesson;
  const cont = document.getElementById("stationContent"); if(!cont) return;
  const words = getLessonVocab(lesson);
  const lines = getAllLines(lesson);
  const r = S.roadmap[lesson.id]||{};
  if(words.length<3 && lines.length<3){
    cont.innerHTML = `<div class="panel" style="padding:16px;text-align:center"><p>Không đủ dữ liệu tạo quiz.</p>
      <button class="btn" style="background:#10b981" onclick="completeStationStep('quiz')">Bỏ qua ✅</button></div>`;
    return;
  }

  // PHẦN A: Quiz từ vựng (5 câu)
  const quizWords = words.slice().sort(()=>Math.random()-0.5).slice(0,Math.min(5,words.length));
  const vocabQs = quizWords.map(w=>{
    const others = VOCAB.filter(v=>v.h!==w.h && v.lv<=lesson.level+1).sort(()=>Math.random()-0.5).slice(0,3);
    return {word:w, options:[w,...others].sort(()=>Math.random()-0.5), answered:false, correct:false};
  });

  // PHẦN B: Sắp xếp câu (2 câu) - cho nghĩa tiếng Việt, sắp xếp từ tiếng Trung
  const writeQs = lines.slice().sort(()=>Math.random()-0.5).slice(0,2).map(line=>{
    const chars = line.h.replace(/[。，！？、；：""''（）\s]/g,"");
    // Tách thành các "từ" (2-3 ký tự mỗi chunk hoặc individual)
    const chunks = [];
    let tmp = "";
    for(let c of chars){
      tmp += c;
      if(tmp.length >= 2 + Math.floor(Math.random()*2)){
        chunks.push(tmp); tmp = "";
      }
    }
    if(tmp) chunks.push(tmp);
    const shuffled = chunks.slice().sort(()=>Math.random()-0.5);
    return {line, chunks, shuffled, userOrder:[], done:false, correct:false};
  });

  window._stQuiz = vocabQs;
  window._writeQs = writeQs;

  let html = `<div class="panel" style="padding:16px">
    <h3 style="margin-top:0">🎯 Quiz tổng hợp</h3>
    <p style="color:var(--muted);font-size:13px">Phần A: Chọn nghĩa đúng. Phần B: Sắp xếp câu. Cần đúng <b>70%+</b>.</p>
    <h4>Phần A: Từ vựng</h4>`;
  vocabQs.forEach((q,i)=>{
    const esc = q.word.h.replace(/'/g,"\\'");
    html += `<div id="stQ${i}" class="panel" style="padding:12px;margin:8px 0">
      <div style="font-size:22px;font-weight:700;margin-bottom:4px">${q.word.h}
        <button class="btn btn-ghost" style="font-size:12px;padding:2px 6px" onclick="speak('${esc}')">🔊</button>
      </div>
      <div style="font-style:italic;color:#6366f1;font-size:13px;margin-bottom:8px">${q.word.p}</div>
      <div class="row" style="flex-wrap:wrap;gap:6px">
        ${q.options.map(o=>`
          <button class="btn btn-ghost stQuizOpt" data-qi="${i}" data-ans="${o.h}"
            onclick="answerStQuiz(${i},'${o.h.replace(/'/g,"\\'")}','${esc}')"
            style="flex:1;min-width:120px;padding:8px;text-align:center;font-size:14px">${o.m}</button>
        `).join("")}
      </div>
      <div id="stQR${i}" style="margin-top:6px"></div>
    </div>`;
  });

  html += `<h4 style="margin-top:20px">Phần B: Sắp xếp câu</h4>`;
  writeQs.forEach((q,i)=>{
    html += `<div id="wrQ${i}" class="panel" style="padding:12px;margin:8px 0">
      <div style="color:var(--muted);font-size:13px;margin-bottom:4px">Nghĩa: <b style="color:var(--ink)">${q.line.m}</b></div>
      <div style="font-style:italic;color:#6366f1;font-size:12px;margin-bottom:8px">${q.line.p}</div>
      <div id="wrArea${i}" style="min-height:36px;padding:8px;border:2px dashed #d1d5db;border-radius:8px;margin-bottom:8px;display:flex;flex-wrap:wrap;gap:4px"></div>
      <div id="wrPool${i}" class="row" style="flex-wrap:wrap;gap:6px">
        ${q.shuffled.map((c,ci)=>`
          <button class="btn btn-ghost wrChunk" data-wi="${i}" data-ci="${ci}"
            onclick="pickWriteChunk(${i},${ci},'${c}')"
            style="padding:6px 12px;font-size:16px;font-weight:600">${c}</button>
        `).join("")}
      </div>
      <div class="row" style="gap:6px;margin-top:6px">
        <button class="btn btn-ghost" onclick="resetWriteQ(${i})" style="font-size:12px">↩ Xóa hết</button>
        <button class="btn" onclick="checkWriteQ(${i})" style="font-size:12px">Kiểm tra</button>
      </div>
      <div id="wrR${i}" style="margin-top:4px"></div>
    </div>`;
  });

  html += `<div id="stQuizResult" style="text-align:center;margin-top:14px"></div></div>`;
  cont.innerHTML = html;
}

window.answerStQuiz = function(qi, chosen, correct){
  const q = window._stQuiz[qi]; if(q.answered) return;
  q.answered = true; q.correct = (chosen===correct);
  document.querySelectorAll(`#stQ${qi} .stQuizOpt`).forEach(btn=>{
    btn.disabled = true;
    if(btn.dataset.ans===correct) btn.style.background="#d1fae5";
    if(btn.dataset.ans===chosen && chosen!==correct) btn.style.background="#fee2e2";
  });
  const rEl = document.getElementById("stQR"+qi);
  if(rEl) rEl.innerHTML = q.correct?`<span style="color:#10b981;font-weight:600">Đúng! ✅</span>`:`<span style="color:#ef4444">Sai. Đáp án: <b>${correct}</b></span>`;
  checkQuizComplete();
};

window.pickWriteChunk = function(wi, ci, text){
  const q = window._writeQs[wi]; if(q.done) return;
  q.userOrder.push(text);
  const btn = document.querySelector(`#wrPool${wi} .wrChunk[data-ci="${ci}"]`);
  if(btn) btn.style.display="none";
  const area = document.getElementById("wrArea"+wi);
  if(area) area.innerHTML = q.userOrder.map(c=>`<span style="background:#eef2ff;padding:4px 10px;border-radius:6px;font-size:16px;font-weight:600">${c}</span>`).join("");
};
window.resetWriteQ = function(wi){
  const q = window._writeQs[wi]; if(q.done) return;
  q.userOrder = [];
  document.querySelectorAll(`#wrPool${wi} .wrChunk`).forEach(b=>b.style.display="");
  const area = document.getElementById("wrArea"+wi);
  if(area) area.innerHTML = "";
  const r = document.getElementById("wrR"+wi);
  if(r) r.innerHTML = "";
};
window.checkWriteQ = function(wi){
  const q = window._writeQs[wi]; if(q.done) return;
  const userText = q.userOrder.join("");
  const target = q.chunks.join("");
  q.done = true; q.correct = (userText===target);
  const r = document.getElementById("wrR"+wi);
  if(r) r.innerHTML = q.correct
    ?`<span style="color:#10b981;font-weight:600">Đúng! ✅ ${q.line.h}</span>`
    :`<span style="color:#ef4444">Chưa đúng. Đáp án: <b>${q.line.h}</b></span>`;
  checkQuizComplete();
};

function checkQuizComplete(){
  const vqs = window._stQuiz||[];
  const wqs = window._writeQs||[];
  const allVDone = vqs.every(q=>q.answered);
  const allWDone = wqs.every(q=>q.done);
  if(!allVDone || !allWDone) return;
  const vRight = vqs.filter(q=>q.correct).length;
  const wRight = wqs.filter(q=>q.correct).length;
  const total = vqs.length + wqs.length;
  const right = vRight + wRight;
  const pct = total?Math.round(right/total*100):0;
  const pass = pct>=70;
  const el = document.getElementById("stQuizResult");
  const r = S.roadmap[_stationLesson.id]||{};
  if(el) el.innerHTML = `<div style="padding:12px;border-radius:10px;background:${pass?'#f0fdf4':'#fef2f2'}">
    <b style="font-size:20px;color:${pass?'#10b981':'#ef4444'}">${right}/${total} đúng (${pct}%)</b>
    <p style="margin:6px 0">Từ vựng: ${vRight}/${vqs.length} | Sắp xếp câu: ${wRight}/${wqs.length}</p>
    ${pass?`<button class="btn" style="background:#10b981" onclick="completeStationStep('quiz')">${r.quiz?"Xong ✅":"Hoàn thành ✅"}</button>`
      :`<button class="btn" onclick="renderStepQuiz()">Thử lại</button>`}
  </div>`;
}

/* --- Hoàn thành 1 bước → cập nhật state --- */
window.completeStationStep = function(step){
  const id = _stationLesson.id;
  if(!S.roadmap[id]) S.roadmap[id] = {};
  const wasNew = !S.roadmap[id][step];
  S.roadmap[id][step] = true;
  if(wasNew){
    addXP(10);
    S.todayRoadmapDone = new Date().toISOString().slice(0,10);
  }
  saveState();
  // Tìm bước tiếp theo chưa xong
  const r = S.roadmap[id];
  const nextStep = STATION_STEPS.find(s=>!r[s]);
  if(nextStep){
    _stationStep = nextStep;
    if(nextStep==="speak") _spkScores = {};
  } else {
    toast("🎉 Hoàn thành trạm "+_stationLesson.title+"! +30 XP");
    if(wasNew){ addXP(20); setTimeout(function(){ showNextStepToast("Hoàn thành bài "+_stationLesson.title); }, 800); }
  }
  renderStation();
};

let chatState = null;

// Build a unified phrase bank từ tất cả nguồn (LAZY_POOL + EXPRESS30 + SCENARIOS)
function buildPhraseBank(){
  const bank = [];
  try{
    if(typeof LAZY_POOL !== "undefined"){
      LAZY_POOL.forEach(p => bank.push({h:p.h, p:p.p, m:p.m, tag:p.tag||"cơ bản"}));
    }
  }catch(e){}
  try{
    if(typeof EXPRESS30 !== "undefined"){
      EXPRESS30.forEach(d => {
        if(d.key) bank.push({h:d.key.h, p:d.key.p, m:d.key.m, tag:"câu cốt lõi"});
        if(Array.isArray(d.dialogue)){
          d.dialogue.forEach(line => { if(line && line.h) bank.push({h:line.h, p:line.p||"", m:line.m||"", tag:"hội thoại"}); });
        }
      });
    }
  }catch(e){}
  try{
    SCENARIOS.forEach(s => {
      if(s.starter) bank.push({h:s.starter.h, p:s.starter.p, m:s.starter.m, tag:"tình huống"});
      (s.responses||[]).forEach(r => { if(r && r.h) bank.push({h:r.h, p:r.p||"", m:r.m||"", tag:"tình huống"}); });
      if(s.fallback && s.fallback.h) bank.push({h:s.fallback.h, p:s.fallback.p||"", m:s.fallback.m||"", tag:"tình huống"});
    });
  }catch(e){}
  // Dedupe theo hanzi
  const seen = new Set();
  return bank.filter(x => {
    if(!x.h || seen.has(x.h)) return false;
    seen.add(x.h); return true;
  });
}
const PHRASE_BANK = buildPhraseBank();

// Bỏ dấu tiếng Việt để fuzzy match
function stripAccents(s){
  return (s||"").toString().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/đ/g,"d");
}

// Search: nhận query (tiếng Việt / pinyin / hanzi), trả về top matches
function searchPhrases(query, limit){
  limit = limit || 6;
  const q = (query||"").trim();
  if(!q) return [];
  const qHan = /[\u4e00-\u9fff]/.test(q);
  const qLow = q.toLowerCase();
  const qNoAcc = stripAccents(q);
  const tokens = qNoAcc.split(/\s+/).filter(Boolean);
  const results = [];
  PHRASE_BANK.forEach(item => {
    let score = 0;
    if(qHan){
      if(item.h === q) score += 100;
      else if(item.h.includes(q)) score += 60;
    } else {
      const mNoAcc = stripAccents(item.m);
      const pLow = (item.p||"").toLowerCase();
      const pNoAcc = stripAccents(item.p);
      if(mNoAcc === qNoAcc) score += 120;
      else if(mNoAcc.startsWith(qNoAcc)) score += 80;
      else if(mNoAcc.includes(qNoAcc)) score += 50;
      if(tokens.length > 1){
        let hit = 0;
        tokens.forEach(t => { if(t.length>1 && mNoAcc.includes(t)) hit++; });
        if(hit === tokens.length) score += 40;
        else if(hit > 0) score += 15 * hit;
      }
      if(pLow === qLow) score += 70;
      else if(pNoAcc.includes(qNoAcc)) score += 30;
    }
    if(score > 0) results.push({item, score});
  });
  results.sort((a,b)=>b.score-a.score);
  return results.slice(0, limit).map(r=>r.item);
}

function addChatMsg(who, payload){
  chatState.messages.push({who, ...payload});

  if(who==="ai"){
    d.innerHTML = `${payload.h}<small>${payload.p}<br><i>${payload.m}</i></small>`;

    d.innerHTML = `${payload.h}${payload.p?`<small>${payload.p}</small>`:""}`;

}

function phraseCardHTML(item, hint){
  const h = (item.h||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,'&quot;');

      </div>
    </div>`;
}

function updateSuggestions(query){
  const sugg = document.getElementById("sugg");
  if(!sugg) return;
  const q = (query||"").trim();

  // Nếu có query → search trong PHRASE_BANK
  if(q.length >= 1){
    const hits = searchPhrases(q, 8);
    if(hits.length){
      sugg.innerHTML =
        `<p style="color:var(--muted);font-size:12px;margin:0 0 8px">🔎 ${hits.length} gợi ý cho "<b>${q}</b>"</p>` +
        hits.map(phraseCardHTML).join("") +
        `<p style="color:var(--muted);font-size:11px;margin-top:4px">💡 Bấm 🔊 để nghe, bấm <b>Dùng</b> để chèn vào ô chat</p>`;
      return;
    } else {
      sugg.innerHTML = `
        <p style="color:var(--muted);font-size:12px">Không tìm thấy câu tiếng Trung phù hợp với "<b>${q}</b>".</p>
        <p style="color:var(--muted);font-size:11px">Thử gõ các từ khóa ngắn như: "xin chào", "cảm ơn", "bao nhiêu tiền", "giúp tôi"…</p>`;
      return;
    }
  }

  // Không có query → gợi ý mặc định theo scenario
  const sc = chatState && chatState.scenario;
  if(!sc){ sugg.innerHTML = ""; return; }
  const picks = (sc.responses||[]).slice(0, 4).map(r => ({
    h: r.h, p: r.p || "", m: r.m || "", tag: "tình huống"
  })).filter(x => x.h);
  let html = `<p style="color:var(--muted);font-size:12px;margin:0 0 8px">💡 Câu gợi ý cho ngữ cảnh <b>${sc.emo||""}</b></p>`;
  html += picks.map(phraseCardHTML).join("");
  html += `<p style="color:var(--muted);font-size:11px;margin-top:4px">Hoặc gõ tiếng Việt bên dưới để dịch câu bạn muốn nói.</p>`;
  sugg.innerHTML = html;
}

window.sendChat = function(){
  const input = document.getElementById("chatInput");
  const text = input.value.trim();
  if(!text) return;
  input.value = "";
  addChatMsg("me", {h:text});
  const sc = chatState.scenario;
  // Tìm phản hồi
  let response = null;
  for(const r of sc.responses){
    if(r.trig.some(t=>text.toLowerCase().includes(t.toLowerCase()))){
      response = r; break;
    }
  }
  if(!response) response = sc.fallback;
  setTimeout(()=>{ addChatMsg("ai", response); addXP(3); saveState(); }, 500);
};

window.chatListen = function(){
  const mic = document.getElementById("chatMic");
  const ms = document.getElementById("chatMs");
  mic.classList.add("rec");
  ms.textContent = "🎙️ Đang nghe...";
  listenOnce((text)=>{

    document.getElementById("chatInput").value = text;
    setTimeout(sendChat, 400);
  }, ()=>mic.classList.remove("rec"));
};
